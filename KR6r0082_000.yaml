body:
  text: 西舫彚征序夫法藏創闢四淨艤願船于樂津能仁誓攝五濁駕慈船於苦海此擡彼搦務在弘濟羣生讚勝折劣惟期善誘諸趣噫覺皇出現惟此為一大事因緣歟何其嘔心瀝血説此難信躬此難行僧祗劫來少無疲厭也然吾嘗聞之淨剎寶池蓮華化生之人金軀香潔月容端好福智俱隆快樂自在云大抵據因以感果則隨其心淨佛土自淨矣淨業行者必須修心如蓮之皎潔無瑕如蓮之清香遠徹如蓮之處染常淨如蓮之入水不著然後乃托蓮胎而初發心時便有一朵蓮華生芽於德水之中隨人勤慢華為榮悴此理昭然更何疑乎且不待聖而興自是上等見賢思齊正為吾儕今日之急務故搜輯從古諸上善人歸化靈迹亟付剞劂欲與蓮社法侶共覩先進之模楷庸作西邁之章程耳在昔道珍闕經不得附載于歸帆通志易服僅能追泛於去舶古德云生死忙忙古渡頭彌陀撥動濟人舟無時不作難遭想歡喜同登解脫船以知愛河滉漾欲浪淘湧須用舟楫乃能涉險濤達願海誕登彼岸也故名其書曰西舫彚征云爾時祝犂亶安南至日釋瑞璋題西舫彚征目録卷上尊宿瑞化晉辨覺慧遠覺寂慧永慧特道生曇順僧睿曇恆道昺曇詵道敬佛馱邪舍跋陀羅曇翼曇雍僧濟慧恭法安慧虔南宋曇鑑道海曇泓道廣道光曇弘齊慧進梁道珍魏曇鸞北齊慧光法琳僧柔周慧命法音僧崖隋智舜真慧智通南嶽慧思天台智顗慧成慧命灌頂法喜等觀法俊道喻壽洪法智慧海汶水沙彌唐善胄法祥明瞻道綽道撫光明善導智琰神素功逈道昂善道惟岸法持慧日般舟承遠僧衒啓芳圓果辨才自覺五會法照臺巖少康懷玉齊翰神皓僧藏寶相百丈大智智欽法順懷感德美石晉志通宋紹巖守真晤恩義通知禮遵式有基本如永明延壽慧才思義元淨從雅若愚智深處謙圓淨省常悟新真歇懷深宗曉寂堂宗坦子元懷義智圓僧藏有嚴中立擇瑛思照宗利齊玉仲閔瑩珂靈照可久宗本善本元照道言慈覺宗賾惟月思敏行詵法持慧亨用欽妙生惟渥沖益法宗睎湛曇懿太微思聰了義慧誠祖南法因了然智仙思淨如湛思梵文慧慧明智廉淨觀利先師安如寶顯超有開道生若觀覃異元肇智印戒度道琛有朋妙雲睎顏了宣善榮祖輝如鑑祖新元中峯明本善住天如惟則優曇普度妙文盤谷明楚石梵琦祖香慧日蓮池袾宏寶珠真青佛石黃州僧海寶藕益智旭實相清道樞具宗大真林谷萬緣本沖廣志實定佛安際會達文高尼淨因隋大明南宋法盛道爰法藏唐淨真悟性宋能奉慧安明無為清本印遂欽律宗佛琦卷下居塵卓行烏長國王晉劉程之張野周續之張詮宗炳雷次宗闕公則梁庾銑高浩象隋宋滿唐李白白居易韋文晉汾陽老人鄭牧卿張元祥李知遙馬子雲于昶元子才元子平石晉張抗宋鍾離瑾鍾離景融文彥博蘇軾楊傑馬亮馬玗馬永逸胡闉葛繁王古江公望王沖張迪賈純仁梅汝能馮楫吳秉信錢象祖王仲回張榆陸沅道王日休房翥孫抃王闐咱定國樓汾魏世子葛濟之左伸范儼閻榮姚約沈銓梅福孫良胡皓唐世良陸偉李秉邵彪陳企劉慧仲李子清李彥通陸浚魏師贊何曇遠大善寺童倪道者馮珉黃打鐵計公徐六公沈三郎元何曇迹明朱綱顧源朱元正丁明登唐時劉通志唐廷任楊嘉褘郝熙載戈以安孫叔子戴百戶華居士蓮華太公郭大林糖擔老人吳江老人清吳澆燭吳叔寶吳瞻樓黃攝六余集生金光前韓承山喬忠我翟夢鯉沈養素戴公烈沈敬孚顧天瑞陸士詮馬良在閨清操隋獨孤皇后唐姚婆宋荊王夫人吳縣君馬朝奉妻蔡縣君馮少師女鄭氏陸宜人朱如一樓慧靖周妙聰秦淨堅鄭淨安秦淨樂黃氏袁氏陳氏王氏孫氏李氏王氏盛氏沈氏蔣婆任夫人約山翁婆裴氏溫靜文妻孟氏梁氏陳念佛道者陳氏胡淨安孫氏郭妙圓周行婆龔氏鍾婆黃婆朱氏淨心周氏項妙智沈妙智崔婆元陶氏周婆明鍾氏薛氏于媼方氏陶氏孫中官母徐氏李氏朱氏楊選一妻湯公甫母蔡坦如妻清張氏徐氏卓氏江太君傅德蓮太宜人陸氏俞氏陸氏曹氏許氏陶瓊樓汪鏡智費孺人發悔頓超惟恭雄俊京屠張鍾馗張善和金吳瓊鄭鄰錢青侯含識俱往裴氏鸚鵡門沙鸜鵒天台鸜鵒劉成魚吳雪崖雞參將蛇天一犬
