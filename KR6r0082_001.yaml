body:
  text: 釋秋波堂瑞璋輯尊宿瑞化法師諱慧遠姓賈氏鴈門樓煩人幼而好學年十三隨舅令狐氏遊學許洛博綜六經尤善莊老二十一欲渡江從學范寧適南路梗塞時釋道安建剎於太行常山一面盡敬以為真吾師也初聞安常講般若經豁然開悟歎曰九流異議皆粳秕耳遂與母弟慧持投簪受業精思諷誦以夜繼晝師神明英越志與理冥安師常臨衆歎曰使道流東國者其在遠乎太元六年至潯陽見廬山間曠可以息心乃立精舍以去水猶遠舉杖扣地曰若此可居當作朽壤抽泉言畢清流涌出潯陽亢旱師詣池側讀海龍王經忽有神蛇從池而出復臾大雨歲竟有秋因名龍泉精舍永師先居廬山西林欲邀同止而師學侶寢衆永乃謂刺史桓伊曰遠公方當弘道而貧道所棲隘不可處時師夢山神告曰此山足可棲神願毋它往其夕大雨雷震詰朝林麓廣闢素沙布地楩柟文梓充布地上不知所自至伊大敬感乃為建剎名其殿曰神運以在永師舍東故號東林嘗謂諸教三昧其名甚衆功高易進念佛為先既而謹律息心之士絶塵清信之賓不期而至者慧永同師安公先居西林慧持遠師同母弟道生曇順並羅什門弟僧睿曇恆道昺曇詵道敬並遠師門人佛馱邪舍此云覺明罽賓國人佛馱跋陀羅此云覺賢迦維衛國人名儒劉程之號遺民張野周續之張詮宗炳雷次宗等結社念佛世號十八賢復率衆至百二十三人同修淨土之業造西方三聖像建齋立誓令劉遺民著發願文而王喬之等復為念佛三昧詩以見志聞鳩摩羅什入關遣書通好什答書曰傳譯來貺粗聞風德經言末代東方有護法菩薩欽哉仁者善弘其道釋惠要患山中無刻漏乃於水上立十二葉芙蓉因波隨轉分定晝夜以為行道之節謂之蓮華漏師居山三十年迹不入俗唯以淨土克勤於念初十一年澄心繫想三覩聖相沈厚不言後十九年七月晦夕於般若臺之東龕方從定起見阿彌陀佛身滿虗空圓光之中有諸化佛觀音勢至左右侍立又見水流光明分十四支流注上下演説苦空無常無我之音佛告之曰我以本願力故來安慰汝汝後七日當生我國又見佛馱邪舍慧持義熙八年先逝慧永義十年先逝劉遺民義熙六年先逝在佛之側前揖師曰師志在先何來之晚師語法淨惠寶曰吾始居此十一年中三見佛相今復見之吾生淨土必矣又曰七日之期斯為漸矣即寢疾製遺誡曰吾昔以知命之年託業此山自審有必盡之期便欲絶迹外緣以求其志良由性弱於斷遂令同趣相引時賢過眷情以類感不覺形與運頽今年已八十三矣仰尋違離之誨俯慨自負之心徒令此生虗謝以悼往疾之深今於至時露骸松林之下即嶺為墳與土木同狀此乃古人之禮汝等勿違苟神理不昧庶達其誠大哀世尊亦當祐之以道門徒號慟若喪父母師以世情難割乃制七日展哀至期始順寂即義熙十二年八月六日也弟子不忍露尸與潯陽太守阮侃奉全軀舉葬於西嶺纍石為塔所著經論諸序銘贊詩記凡十卷號廬山集粵稽淨土法門雖傳於震朝至佛圖澄而著由澄而得道安安之門有遠公負荷至教廣大聖道名重帝王法流天下百世之下推師為淨業始祖焉慧永河內潘氏年十二出家事沙門竺曇現初習禪於恆山與遠師同依安法師期結宇羅浮及遠師為安公所留師乃欲先度五嶺太元初至潯陽刺史陶範素挹道風乃留憩廬山捨宅為西林以奉師布衣蔬食精心克己容嘗含笑語不傷物峯頂別立茅室時往禪思至其室者常聞異香因號香谷一虎同居人至輒驅去遠師來之龍泉桓伊為立東林三十年影不出山師居西林亦如之嘗因法事至近邑還山薄暮烏橋營主醉騎馬當道遮師不聽去師以杖指馬馬驚走營主仆地師捧慰之遂還營主病往寺悔罪師曰非貧道意為禱之尋愈鎮南將軍何無忌鎮潯陽至虎溪請遠公及師遠公持名望從徒百餘高言華論舉止可觀師衲衣半脛荷錫捉鉢松下飄然而至無忌謂衆曰永公清散之風乃多於遠師也師標誠植願動在安養義熙十年在疾忽斂衣求屣欲起衆驚問師曰佛來也言終而化異香七日方歇葬於寺之西南春秋八十三慧持遠公同母弟也幼讀書一日所記常敵十日年十八與兄同事安公遍學衆經遊刃三藏及安公在襄陽遣遠公與師東下遂止廬山師形長八尺衲衣垂膝徒屬三百師為上首豫章太守范寧請師講法華經阿毗曇論四方雲聚琅瑘王珣與范寧書問遠持二公孰愈寧曰誠謂賢兄賢弟珣復書曰但令如弟誠未之有況復賢邪羅什在關中遙相欽敬每致書通好隆安三年辭兄入蜀遠公留之曰人生愛聚汝獨樂離師曰滯情愛聚者本不應出家今既割欲求道正以西方為期耳即悵然而別至成都𮠁縣居龍淵寺大弘佛法升其堂者號登龍門義熙八年順寂春秋七十六臨終遺命務嚴律儀專心淨業以東間經籍付道泓西間法典付曇蘭以泓行業清敏蘭神悟天發並能繼軌師蹤焉道生魏氏巨鹿人幼從竺法汰出家披對經誥一覽能誦年在志學便登講座吐納明辨雖宿望莫敢酬抗初依廬山常以入道之要慧解為本乃與僧睿慧嚴慧觀等遊學長安從羅什受業關中僧徒咸仰神悟嘗喟然歎曰自經典東流譯人重阻多滯權文鮮通圓義若亡筌得魚始可以言道矣於是校閲真俗精練空有研思因果乃立善不受報及頓悟成佛義又著二諦論佛性常有論佛無淨土論應有緣論並籠舊説妙有淵旨守文之徒嫌嫉競起師又以法顯三藏所翻泥洹經本先至六卷成文經云除一闡提皆有佛性師云夫稟質二儀皆有涅槃正因闡提含生之類何得獨無佛性蓋是經來未盡耳乃唱闡提之人皆得成佛時大本未傳孤明先發舊學僧黨以為背經遂顯大衆擯而遣之師正容誓曰若我所説背經當見身癘疾若與實相不背願舍壽之日踞師子座遂拂衣而行及後大經至聖行品云一闡提人雖復斷善猶有佛性於是諸師皆為愧服師被擯南還入虎邱山聚石為徒講涅槃經至闡提處則説有佛性且曰如我所説契佛心否羣石皆為點頭旬日學衆雲集忽雷震青園佛殿有龍升天因改寺曰龍光師於寺請賓律師譯彌沙塞律傳於世既而辭衆復投廬山預蓮社久之還都止青霞寺宋文帝大會沙門親御地筵食至良久衆疑過中帝曰始可中耳生乃曰白日麗天天言始中何得非中遂舉箸而食一衆從之莫不歎其機辨時王弘范泰顏延之並挹敬風猷相從問道元嘉十一年十一月庚子於廬山升座説法將畢衆見麈尾紛然墜地隱几而化宛若入定諸師聞之益信前誓有證曇順黃龍人幼出承訓羅什講釋羣經妙盡色空無著之旨什歎曰此子奇器也後來廬山同修淨業寧蠻校尉劉遵孝於江陵立寺要師經始盛弘念佛三昧之道宋元嘉二年別衆坐逝異香滿室春秋七十九僧睿冀州人遊學諸方嘗行經蜀西界為人所掠使牧羊有商客異之疑是沙門及問以經義無不綜達即出金贖之後遊歷天竺諸國還至關中從羅什咨稟經義羅什翻法華經以竺法護本云天見人人見天什曰此言過質耳睿曰將非人天交接兩得相見什喜遂用其文久之來入廬山依遠公修淨業既而適京師止烏衣寺講説衆經聽者推服宋彭城王義康要入第受戒師曰禮聞來學王乃入寺祇奉戒法王以貂裘奉師常用敷坐王密令以錢三萬買之師曰此雖非所宜服然王之所施不可棄也王聞益加敬謝靈運篤好佛理殊方俗音多所通解嘗以經中字音求證於師因為著十四音訓梵漢昭然元嘉十六年無疾告衆曰吾將行矣即面西合掌而亡衆見臥內一金蓮華倐爾而隱春秋八十五曇恆河東人童孺依遠公出家年甫十三便能講説內外典籍無不通貫德行清孤物情推服常有羣鹿馴繞座隅自入廬山專志淨業義熙十四年端坐合掌厲聲念佛而化春秋七十二道昺潁川人陳氏幼出家為遠公弟子該通經律兼明莊老志節孤峻言與行合念佛三昧究心無間義熙十四年豫章太守王虔入山謁敬請為山中主用紹遠公之席衆以道源法嗣咸知宗仰元嘉十二年集衆念佛就座而化春秋七十一曇詵廣陵人幼從遠公出家勤修淨業兼善講説注維摩經行於世常著窮通論以明宿修述蓮社録以記往生又能別識鳥獸毛色俊鈍之性洞曉草木枝幹甘苦之味妙盡其理人知其有密證云元嘉十七年集衆謂曰自建寺以來至此五十年吾之西行最在其後即加趺念佛百聲閉息遂絶春秋八十道敬琅琊王氏祖凝之刺江州遂從遠公出家年十七博通經論日記萬言每歎戒律終身難全願淨六根但稟一戒以為得度之要遠公知其堅正許之篤志念佛蚤夜勿替遠公歸寂乃入若邪山宋永初元年謂衆曰先師見命吾其行矣即端坐唱佛而化衆見光明滿室彌時方滅春秋五十二佛馱邪舍晉言覺明賓國婆羅門種有沙門至其家乞食父本外道怒驅之遂手足攣躄巫師謂曰坐犯賢聖即請此沙門悔過旬日乃瘳因令邪舍出家時年十三隨師行曠野與虎遇邪舍曰虎已飽必不傷人前行中道果見餘骸至十五誦經日至萬言以分衛廢業為憂梵語分衛晉言乞食一羅漢來代乞食年十九誦經滿數百萬言性度簡傲不為諸人重至三十猶為沙彌復從舅氏學五明論世間法術至沙勒國待遇隆厚既而羅什至乃從學阿毗曇論十誦律什隨母反龜茲師遂留止行化符堅遣呂光伐龜茲執羅什師聞歎曰我興羅什未盡懷抱今忽羈虜相見何期後十年師東至龜茲盛弘法化羅什在姑臧遣信要之師恐國人止其行取清水以藥投之呪數十言與弟子洗足即夜便發比朝行數百里追之不及問弟子何所覺邪答曰惟聞疾風流響兩目有淚師又呪水洗足乃止既達姑臧什已入長安聞姚主逼以妾媵歎曰羅什如好綿纊何可使入棘林羅什勸姚主遣使迎師既至別立省寺於逍遙園四事供養一無所受時至分衛一食而已時羅什譯出十住經師更相徵決辭理方定師髭赤善解毗婆沙論時人號赤髭論主秦弘始中譯出四分律四十四卷長阿含經二十二卷義熙八年來廬山入社後辭還本國自罽賓以虗空藏經一卷寄商客至涼州佛馱跋陀羅晉云覺賢姓釋迦迦維羅衛國人甘露飯王裔末也幼亡父母出家為沙彌年十六博學羣經深達禪律常與僧迦達多共遊罽賓達多閉戶禪坐忽見師來云暫往兜率致敬彌勒言訖便隱後益見其神變敬心祈問方知得不還果時姚秦沙門智嚴至罽賓覩法衆清淨慨然東顧曰吾諸同輩未遇真匠將何發悟即咨詢於衆孰能遂我祈請流化東土僉應之曰跋陀羅其人也嚴乃要師褁糧而行經歷諸國至交趾附舶循海達於青州東萊聞鳩摩羅什在長安即往從之秦太子泓請師於東宮集衆説法與羅什論色空義師曰汝秪説得果中色空不説得因中色空什問何謂師曰一微空故衆微空衆微空故一微空一微空中無衆微衆微空中無一微往復數番羅什罔測秦主興供僧三千盛修人事而師禪靜自守忽謂弟子曰吾見本國五舶俱發衆謂妄言因共擯棄乃與弟子慧嚴慧觀四十餘人俱發至廬山香谷茇舍而居時會蓮社遠公謂師被擯過由門人懸記五舶於律無犯即遣弟子曇雍致書秦主為其解擯乃請師東林譯出禪教諸經自是江東始耽禪悅師志在遊化西適江陵持鉢分衛果見天竺五舶至此後還都立道場寺先是支法領於于闐得華嚴梵本三萬六千偈未經宣譯義熙十四年吳郡內史孟顗右衛將軍褚叔度請師為主譯與沙門法業慧義慧嚴慧觀等為筆授譯成六十卷有二青衣朝從池出灑掃研墨師先後譯出觀佛三昧經般泥洹經修行方便論及法顯所得大僧祇律凡十五部宋元嘉六年念佛而化塔於廬山北嶺曇翼餘杭人初入廬山依遠公後往關中見羅什東還會稽入秦望山誦法華經十二年感普賢大士化女子身披采服擕筠籠一白豕大蒜兩根至師前曰妾入山采薇日已斜豹狼縱橫歸無生理敢託一宿師卻之力女復哀鳴不已遂令居草床上夜半號呼腹疼告師按摩師辭以持戒不應手觸女號呼愈甚師乃以布褁錫杖遙為按之翌日女以采服化詳雲豕變白象蒜化雙蓮凌空而上謂師曰我普賢菩薩特來相試郡太守孟顗聞於朝敕建法華寺今天衣寺初餘杭山沙門法志常誦法華有雉巢於庵側翔集座隅若聽受狀如是七年一日忽憔悴志曰汝能聽經必生人道明朝雉殞即為瘞之夜夢童子拜曰因聽經得脫羽類今生山前王氏後其家設齋志方踵門兒曰我和上來也志撫之曰汝我雉兒也解衣視腋下有雉毳三莖七歲令入山出家十六落髮以腋有毳因名以翼曇雍楊氏關中人形長八尺雄武過人南來廬山依師遠公內外典籍無不綜習立茅屋於山西以自居止有弟子曇果澄思禪門一夕夢山神求受戒法果曰家師在此可往求之雍忽見一人著夾衣風神端雅從者三十人乞授戒師以果先夢知是山神乃為説法授五戒畢神以外國二鋤為襯禮謝而去師後往荊州行化卒於竹林寺僧濟入廬山問道精悟深要遠公歎曰紹隆大法其在汝乎及在疾遠公以燭遺之曰汝可憑此建心安養師執燭停想延僧諷淨土經至五更以燭授弟子元弼隨僧行道頃之夢自秉一燭浮空而行見阿彌陀佛接至於掌遍事諸佛復臾而覺喜曰吾以一夕觀念便蒙接引明日復於空中見佛菩薩謂弼曰佛來也即舉首西顧一息而終時方炎歊體三日不變異香郁然慧恭豫章豐城人與僧光慧堪慧蘭同志為學光等學力不逮恭而於淨土繫想則過之蘭謂恭曰君雖力學博聞豈不知經云如聾奏音樂悅彼不自聞恭曰覺不可已孰能未死昧昧如癡哉後七年蘭等先逝去時並有奇應又五年恭病且篤曰大道沿洄何時可止死生去來吾何歸哉於是叩頭雨泣誓心安養念不少間忽見無量壽佛以金臺前迎恭乘其上見蘭等於臺上光明中而告之曰長老受生已居上品吾等不勞慰喜但恨五濁淹延相依之晚耳恭於是日告衆欣然奮迅而滅時義熙十一年也法安初依遠公為弟子妙善講説兼習禪業律身持戒為行尤精義熙中新陽邑社有暴虎居神廟樹下前後害民以百數安遊其村居民皆早閉門乃之樹下禪坐須臾虎負人至見安驚喜跳伏安乃為説法授戒有頃而去明朝居民見安謂是神人相率禮敬因改神廟立寺宇請安居之左右田園並捨為寺業嘗欲畫像須銅青慮不可致忽夢一人跪床前云此下有銅鍾寤即掘之果得二鍾取青成像而以銅助遠公鑄佛後不知所終慧虔晉末居廬山見遠公德業之盛歎曰吾人也彼人也乃之山陰嘉祥寺聚徒講經謂衆曰願乘講道用奉彌陀後五年知時已至乃曰華開見佛即其時矣其夕有尼淨嚴假寐之頃見觀音勢至與百千衆從空而下嚴問大士何所之曰嘉祥迎虔公耳虔亦預感勝相以告弟子奄然長往異香經旬不歇曇鑑宋時居江陵定中感佛以水灑面曰滌汝塵垢清汝心念一夕念佛步廊及朝趺坐而化同時江陵道海淮南曇弘東轅道廣弘農道光臨終皆見金臺來迎之相曇弘南適交趾誦觀經不記數於山崦聚薪焚身得舍利數百人見弘身金色乘金鹿向西去慧進齊永明初於揚州高座寺發願誦法華用嚴淨土執卷病生乃復造經百部以悔宿障部帙既滿病亦隨愈聞空中聲曰汝事已辦汝願已遂欲生淨土非汝而誰一日無病念佛而化道珍梁天監中寓廬山慕遠法師標心淨土異時夢中見十人舟櫓浮海問何往曰適安養國珍曰願得隨往答曰一日之修功超永劫子未誦彌陀經未曾浴僧何可求往珍乃大設沐浴專誦彌陀經後二年有捧銀臺至者曰以法師之功當得金臺奈何始心猶豫故止此耳珍曰苟見佛之基有漸奚必金臺後亡之夕所居山崖烈火千炬鄉民大驚朝則知珍遷化曇鸞鴈門人少遊五臺感靈異出家而性嗜長生受陶隱居仙經十卷還洛下遇菩提流支問曰佛道有長生乎支笑曰長生不死吾佛道也即授以觀經曰能解此則三界無復生六道無復轉其為壽也河沙劫石莫能比焉此吾金仙氏之長生也鸞大喜遂焚毀仙經晝夜專誦觀經修三福業觀想九品寒暑疾痛曾無少懈北魏主嘉之號為神鸞敕住汾州玄中寺一夕正持誦見梵僧入室謂曰吾龍樹也以汝有淨土之念故來見汝鸞曰何以教我僧曰已去不可及未來未可追見在今何在白駒難與回言訖不見鸞自知時至集衆教誡曰勞生役役其止無日地獄諸苦不可以不懼九品淨業不可以不修因令弟子高聲念佛西向稽顙而化衆聞天樂自西以來良久乃已慧光北齊時居洛陽著華嚴涅槃十地等疏妙盡權實之旨一日有疾見天衆來迎光曰我所願歸安養耳已而淨土化佛充滿虗空光曰唯願我佛攝受遂我本願即彈指謦咳言氣俱盡法琳晉原人常誦觀經輒見一僧大身在前北齊建武二年感疾見寶樹下一佛二大士像坐蓮華上琳大慰喜夜半聞鍾聲衆就視之即席而化僧柔學方等諸經齊文宣詔至鄴下柔唯以淨業為懷亡之日見化佛千數室內外聞異香西望敬禮即時遷神慧命北周長沙人十五誦法華才七日終一部與法音為淨土友一夕擕手月下相顧笑曰時至不行為貪生西方有期吾其去矣音曰寧不俟我十日命竪兩指曰過此不可也越二日果終衆見天人下降奇香異樂或唱善哉後十日音亦亡祥瑞悉與命同僧崖北周益州多寶寺發心燒五指萬人擁觀謂弟子曰我去後好供養病患醜陋人此皆佛菩薩權化也坐亡之時衆見寶華紛紛師披衲執錫口唱佛號與數十僧乘空而去智舜入廬山踵遠公淨業講觀經才終即示病見鸚鵡孔念佛念法皆微妙聲告弟子曰我今日往生矣既而果遷化時隋大業初真慧隋大業初居蒲坂麻谷餌黃精絶粒築淨地設四柱寶幢以奉三聖每依像作觀挺身整念必肅肅然一夕謂弟子曰今見蓮華載開載合將承吾足頃之聞鍾天香西來異光驟發已而慧亡智通隋河東人常誦先賢讚佛偈三十首每六時對像引聲高唱委曲凄切聞者悲之大業七年與門人頂蓋同聲念佛忽見光明勝異寶幢華幔謂蓋曰吾生淨土克在今夕即坐亡於懺堂衆見樓閣千重排空而去猶雲霧然慧思陳時來居南嶽專誦法華嘗夢阿彌陀佛彌勒佛與之説法夏竟受歲豁然大悟法華三昧所未聞經不疑自解後將順世即集門學連日説法端坐唱佛來也即合掌而逝智者大師諱智顗姓陳氏頴川人母夢香煙五采縈回入懷誕靈之夕神光照屋七歲入果願寺聞思禪師止大蘇山即往頂拜思曰昔日靈山同聽法華宿緣所追今復來矣因示以普賢道場為説四安樂行師入觀三七日身心豁然宿通潛發見靈山一席儼然未散以所證白師思歎曰非汝莫證非我莫識此法華三昧初旋陀羅尼也大建元年至金陵闡化嘗披一破衲説法天台二十餘年疏觀經著十疑論法華玄義等書勸人進修淨業後於石城石像前將示寂令唱無量壽佛及觀經首題合掌讚曰四十八願莊嚴淨土華池寶樹易往無人火車相現一念改悔尚得往生況戒定熏修行道力故實不唐捐又曰吾諸師友侍從觀音皆來迎我言訖加趺唱三寶名如入三昧後有僧求知師生處乃夢觀音金容數丈智者從後告僧曰汝決疑否再驗智者生西方矣慧成居枝江誦阿彌陀經修西方觀三十年常坐不臥每入定見淨土蓮臺寶樹臨終之夕人有夢成乘蓮華上隱隱西沒慧命天台仙城人臨終誡門人精進淨行衆忽見阿彌陀佛領衆來迎師隨佛後向西而去灌頂章安人臨終示疾室有異香因誡誨弟子畢忽起合掌稱阿彌陀佛二大士名奄然而化法喜常行方等禮懺有一雉來責命神人斥之曰法師當往生淨土豈償汝命後於病中發願以一生所修行業回向淨土至心念佛即見佛菩薩衆來迎端坐而化等觀居天台常誦法華一夕澡浴面西趺坐念佛菩薩及智者名復説三觀法門言畢而終法俊住碧澗寺行法華三昧即獲悟入示滅之日仙樂盈空天香亘野衆見凌空西向而去道喻居開覺寺念阿彌陀佛日夜不廢造其像僅三寸後於定中見佛謂曰汝造我像何小喻曰心大即大心小即小言訖見像身遍滿虗空告曰汝且回本國香湯沐浴明星出時我來迎汝至時感化佛來迎光明滿室壽洪汾陽人常念往西方將亡見兜率天童子來迎師曰我心期西往不生天上即令衆念佛遽云佛從西來矣言訖而化法智居國清寺一心念佛常感觀音勢至來下光映其身謂所親曰吾生淨土有日矣誰能具食餞我衆為具之食訖無它異衆疑其侮宿房而候之夜未央忽安坐床上念佛而化有金光自西來江上漁人誤謂天曉慧海隋大業時居江都安樂寺專心淨業得齊州道詮所遺無量壽佛像殷勤禮懺像忽放光自是懇求往生愈切一日面西趺坐念佛而化汶水二沙彌同志念佛經五年大者先亡得生淨土見佛欣慶即白佛言有小沙彌與我同修不識可得生不佛言汝本無心念佛由彼勸汝汝今宜還益勤淨業三年後可同來此至期佛與衆聖自西來迎大地震動天華飄舞是二沙彌一時俱化善胄博野人勤篤淨業常見佛大士像放光照身一夕疾中倐起合掌祝曰佛以四十八願攝我有情必冀此時如佛本願已而告衆曰佛光照我所願無失言訖而亡法祥住楊都大興國寺三十年修安養之業凡有饒益必用回向因在疾弟子聞師稱佛聲甚厲又見房西壁有光若鏡現淨土境相頻伽鼓翼祥倐然而化明瞻晚歲克志安養或譏其遲暮瞻曰十念功成猶得見佛吾何慮焉後因疾於興善寺具齋別道俗時僕射房玄齡杜如晦皆會焉日過午整威儀遽曰佛來矣二大士亦至竦身合掌而化道綽并州汶水人十四出家習經論晚事瓚禪師學禪後入壁谷玄中寺曇鸞之舊居也專志念佛日以七萬遍為度勸并汾人念佛或以豆記所度者及萬斛貞觀二年四月八日集道俗為如來生朝慶會俄見鸞空中乘七寶船謂綽曰汝淨土堂宇以成衆復見化佛菩薩飄飄在空皆欣仰歎異同志道撫者每相見必指淨土為會綽亡三日撫聞之曰吾常期先行今乃在後吾加一息之功見佛可追矣即於像前叩頭陳露退就其座而化法師善導唐貞觀中見西河綽禪師九品道場講誦觀經大喜曰此真入佛之津要修餘行業迃僻難成唯此觀門速超生死於是勤篤精苦晝夜禮誦續至京師激發四衆每入室胡跪念佛非力竭不休雖時寒冰亦須流汗出則為人演説淨土法門三十餘年不暫睡臥般舟行道方等禮佛護持戒品纖毫不犯好食送厨粗惡自奉乳酪醍醐皆不經口凡有襯施用寫彌陀經十萬卷畫淨土變相三百壁壞寺廢塔所至修營然燈續明常年不絶三衣瓶鉢不使人持行不共衆恐談世事長安道族傳授淨土法門者不可勝數從其化者至有誦彌陀經十萬至五十萬卷者念佛日課萬聲至十萬聲者或得入念佛三昧往生淨土者莫能紀述或問念佛生淨土邪師曰如汝所念遂汝所願乃自念一聲有一光明從其口出十至於百光亦如之其勸世偈曰漸漸雞皮鶴髮看看行步龍鍾假饒金玉滿堂豈免衰殘老病任是千般快樂無常終是到來唯有徑路修行但念阿彌陀佛後謂人曰此身可厭吾將西歸乃登柳樹向西祝曰願佛接我菩薩助我令我不失正念得生安養言已投身而化高宗知其事賜寺額曰光明世傳彌陀化身而立為蓮社二祖云智琰居武邱集僧俗修淨業觀想每月一集五百餘人後於病中見梵僧手執寶瓶前謂之曰吾無邊光也卻後淨土所稱功德寶王乃我爾琰與寺衆論曰無邊光勢至大士功德寶王其成佛之號也我其西歸乎其夕竟亡神素居蒲州講阿毗曇成實論願早登安養後病中令弟子讀觀經靜坐而聽既畢唱佛大士號始終數番至中夜安坐而化功逈浚儀人行普賢懺身不倚者三十年一日普賢來乘六牙象地皆銀色晚年專講法華每至藥草喻品天輒降雨又撰佛地論疏願回所詮之益得生淨土疏成五色異光照其室逈曰得於此時乘光見佛願足矣乃繫念西想不食而化道昂平時修淨土業一日升高座誡飭徒衆遽揖曰彼天衆何雜沓而來天道由來非吾願若淨土相迎即聞命矣因瞑目久之曰阿彌陀佛光明照我諸化菩薩又來會此於是奉爐叩首陳慶忽爐墜而化善道臨淄人入大藏信手探卷得觀無量壽佛經乃專修十六妙觀及往廬山觀遠公遺迹豁然增思後遁迹終南修般舟三昧數載親寶閣瑤池宛然在目復往晉陽從綽禪師授無量壽經入定七日綽請觀所生處道報曰師當懺悔三罪方可往生師嘗安佛像在簷牗下自處深房此一罪也當於佛前懺又嘗役使出家人此二罪也當於四方僧前懺又因造屋多損蟲命此三罪也當於一切衆生前懺綽靜思往咎池心悔謝久之道因定出謂綽曰師罪滅矣後有白光來照之時是往生相也道行化京師歸者如市忽微疾即掩室怡然而逝異香天樂向西而隱惟岸并州人常修十六觀門曾因出觀見觀音勢至現於空中岸頂禮雨淚曰幸由肉眼得覩聖容所恨世無傳焉倐有二人稱善畫聖相既就人亦俱失乃謂弟子曰吾西行其時也有從我者乎一小童曰惟師之命即往白父母歸寺沐浴至像前趺坐而化岸撫其背曰汝何先吾而行即令弟子助聲念佛仰目西顧寂然無聲法持江寧人見黃梅忍禪師悟心要繼牛頭祖位常繫念淨土俯仰不違將終戒弟子露骸松下令禽獸食我血肉起淨土因弟子如其旨見神幡數十西來繞山幡出異光以燭其室慧日泛舶南海至天竺諸國訪善知識問何國何方有樂無苦何法何行速得見佛天竺三藏皆讚淨土日聞喜躍至健陀羅國山有觀音像祈請者或現身日絶食七日畢命為請七日之夜觀音於空中現紫金相長丈餘手摩日頂曰汝欲傳法利人又願生極樂國當如汝志開元七年東歸達長安進佛真容梵夾帝旌其德賜號慈愍三藏著淨土文行於世天寶七年將終見蓮華在前狀如日輪法師承遠始學於成都唐公至荊州進學於玉泉真公真公授師以衡山俾為教魁人從而化者萬計有弟子法照初居廬山由正定聚趣安樂國見蒙惡衣侍佛者佛曰衡山承遠也出而求之肖焉乃從而學傳教天下法照在代宗時為國師乃言其師有異德天子南嚮面禮焉度其道不可徵乃名其居曰般舟道場用尊其位師始居山西南岩石下人遺之食則食不遺則食土泥茹草木其取衣類是南極海裔北自幽都來求厥道或值之崖谷羸形垢面躬負薪槱以為僕從而媟之乃師也凡化人立中道而教之權俾得以疾至故示專念書塗巷刻溪谷丕勒誘掖以援於下不求而道備不言而物成人皆負布帛斬木石委之岩戶不拒不營祠宇既具至德宗朝申詔褒立是為彌陀寺正元十八年七月十九日終於寺壽九十一世推為蓮社三祖云僧衒并州人初念慈氏期生內院年九十遇綽禪師聞淨土之法始回心焉早暮禮佛千拜念佛萬聲三年有疾謂弟子曰阿彌陀佛授我香衣觀音勢至示我寶手吾其去矣既終七日異香不散時啓芳圓果二師目擊斯事乃於悟真寺觀音像前折楊枝置像手誓曰芳等若於淨土有緣當使七日不萎至期枝益茂芳果慶忭晝夜觀念不捨數月忽覺臨七寶池入大寶帳見佛及二大士坐寶華臺光明輝映芳果前作禮佛告之曰汝念我名皆生我國又見寶幡珠網有梵僧御寶車中謂曰吾法藏也故來迎汝芳果忽覺乘車前邁又聞釋迦佛文殊菩薩以梵音聲稱讚淨土寶殿之中有寶階三道第一道純是白衣第二道僧俗相半第三道唯是僧輩佛指謂芳曰此皆閻浮提念佛之人得生此土也後五日二人無病忽聞鍾聲芳果曰鍾聲我輩事也當時俱即化去辨才襄陽人潛修淨土之業二十年未嘗説獨與護戎任公善謂之曰才必生淨土期在十年後令弟子報任公曰向所期已及矣任公及門才曰吾其去矣趺坐而化衆聞仙樂西來異香散滿自覺居平山重林院為鬼神講説者三年屢有祥感嘗發四十八願因觀音大悲接見阿彌陀佛乃率衆建剎鑄大悲像四十九尺俯伏像前陳其願曰聖相已就梵宇已成願承聖力早登安養夜中忽見金色祥光二道佛及菩薩左右隨之佛垂手接覺首曰守願勿易利物為先寶池生處終當如願後十一年見大神雲中出半身謂之曰安養之期已至即於像前跏趺而化國師法照唐大歷二年止衡州雲峰寺慈忍戒定為時所宗嘗於僧堂食鉢中覩五色雲中有梵剎當東北有山澗石門復有一寺金書其題曰大聖竹林寺他日復於鉢中見雲中數寺池臺樓觀萬菩薩衆雜處其中師以所見訪問知識有嘉延曇暉二僧曰聖神變化不可情測若論山川面勢乃五臺耳四年師於郡之湖東寺開五會念佛當是五日為一會耳感祥雲彌覆雲中樓閣覩阿彌陀佛及二菩薩身滿虗空有數梵僧執錫行道復見老人謂曰汝先發願於金色界禮覲大僧今何輒止師遂與同志遠詣五臺見寺南有光及隨至佛光寺一如鉢中所見東北五里果有大山山有澗澗北石門旁二青衣一稱善財一稱難陀引師入門北行見金門樓觀金榜題曰大聖竹林寺寺方二十里一百院皆有金池寶塔華臺玉樹入講堂見文殊在西普賢在東踞師子座為衆説法菩薩萬數共相圍繞師於二菩薩前作禮問曰末代凡夫未審修何法門文殊告曰諸修行門無如念佛阿彌陀佛願力難思汝當繫念決取往生時二大士同舒金臂以摩其頂與之記曰汝以念佛力故畢竟證無上覺文殊復曰汝可往詣諸菩薩院巡禮承教師歷請教授至七寶園復回至大聖前作禮辭退向二青衣送至門外師復作禮舉頭俱失後與五十僧往金剛窟即無著見大聖處忽覩衆寶宮殿文殊普賢及萬菩薩佛陀波利師方作禮舉首即失夜於華嚴院見寺東岩壑有五枝燈師曰欲分百燈既而如願復曰願分千燈數亦如之光遍山谷又前詣金剛窟夜半見佛陀波利引之入寺後復於華嚴院念二大士記我往生乃一心念佛忽見波利謂之曰汝華臺已生後三年華開矣汝見竹林諸寺何不使羣生共知之師因命匠刻石為圖於見處建竹林寺既畢謂衆曰吾事畢矣數日別衆坐逝推波利之言果三年也師於并州行五會教化人念佛代宗於長安宮中常聞東北方有念佛聲遣使尋之至於太原果見師勸化之盛遂迎入禁中教宮人念佛亦及五會號五會法師而蓮社立為四祖云法師少康縉雲仙都人俗姓周氏母羅氏夢遊鼎湖峯有玉女以青蓮華授之曰此華吉祥當生貴子及生青光滿室作芙蕖香七歲未語相者奇之母擕至靈山寺指殿佛謂之曰汝敬佛不遽答曰我佛釋迦誰不為敬父母愈敬異遂舍令出家年十五誦通法華楞嚴等五部尋往會稽嘉祥學究律部後詣上元龍興聽華嚴瑜迦諸論唐貞元年初洛下白馬寺見殿中文籍放光探之乃善導和上西方化導文師曰若於淨土有緣當更放光言已光復閃爍師曰劫石可磨我願無易遂至長安光明寺善導和上影堂大陳薦獻倐見遺像升空而謂之曰汝依吾教廣化有情它日功成必生安養師聞佛音如有所證乃南適江陵路逢僧曰汝欲化人當往新定今嚴州是言訖而隱師既入郡人無識者乃乞錢誘小兒曰阿彌陀佛是汝導師念佛一聲與汝一錢兒務錢者隨聲念之月餘孩孺念佛覔錢者衆師乃曰能念佛十聲者與一錢如此一年無少長貴賤見師者皆稱阿彌陀佛念佛之聲盈滿道路十年乃於烏龍山建淨土道場築臺三級集衆行道師每升座高聲唱佛衆見一佛從口而出連唱十聲則見十佛師曰汝見佛者決得往生時衆數千有不見者嗚呼自責愈加精進二十一年十月三日囑纍道旋當於淨土起欣樂心於閻浮提起厭離心汝曹此時能見光明真我弟子遂放異光數道而逝郡人為建塔於臺巖號臺巖法師而蓮社立為五祖云懷玉丹邱人布衣一食常坐不臥觀想淨土將四十年日課佛名五萬誦彌陀經三十萬遍天寶元年見佛菩薩滿虗空中一人持銀臺來迎玉曰吾一生念佛誓取金臺聖衆遂隱師彌加精苦三七日後向人復來曰法師已得上品生忽異光照室越三日書偈曰清淨皎潔無塵垢蓮華化生為父母我經十劫修道來出示閻浮厭衆苦一生苦行超十劫永離婆娑歸淨土弟子見佛菩薩共御金臺西下迎玉而去郡太守假公作偈贊曰我師一念登初地佛國笙歌兩度來惟有門前古槐樹枝低只為罣金臺齊翰居武邱入流水念佛道場一念之頃即見淨土境相忽作歌曰流水動兮波漣芙蕖輝映兮寶光隨乘光西邁兮偕者誰初師十年在疾弟子問曰和上舍生何乃抱病師曰必謝之軀雖聖未免即回瞻聖像而亡神皓於吳郡結道俗為西方社有不能遺塵纍者引退之時以為旃檀林中常材自枯後示疾謂弟子曰淨土聖相已現吾今夕必往生乃澡身易衣端坐而化香氣滿室僧藏西河人夏月在草間餧蚊念阿彌陀佛二十年許飲食行坐志在安養忽於病中見化佛光照其身次日謂侍者曰吾適瞑目正在淨土諸上善人散華召我乃整衣西向而化大行入泰山行普賢懺三年感大士現身晚歲入藏室陳意隨手取卷得彌陀經乃日夜誦詠至三七日覩琉璃地上佛及二大士現身其前僖宗聞其事詔入內賜號常精進菩薩封開國公後一年琉璃地復現即日右脅而終異香旬日不散肉體不壞寶相居長安六時禮懺者三十年夜誦彌陀經七過佛號六萬聲後忽見佛大士衆自西來迎囑諸徒曰念佛為業西方相待百丈大智馬祖嫡嗣天下叢林共宗而祈禱病僧化送亡僧悉歸向淨土以為超度智欽專習禪業又禮一萬五千佛名一百遍後於鄭州阿育王塔所燒一臂願生淨土弟子僧護夜半見庭前光照異常因問何人秉炬凡三問空中聲云來迎欽禪師耳護急推窗觀之即見佛身光明幡華寶蓋勝空飛下欽應時化去法順杜氏每遊歷郡國勸念阿彌陀佛著五悔文讚詠淨土弟子至五臺見老人謂曰文殊今住終南山杜順和上是也歸則順亡懷感居長安千福寺念佛三年見佛金色玉毫得入三昧乃製決疑論七卷臨終見佛來迎合掌而化德美於會昌寺西院造懺悔堂年別般舟一夏不坐或止口過三年不言或行不輕通禮七衆或節衣食四分除二或去世想專念西方口誦彌陀終於命盡後於一時入室稱佛倐然而化志通遊天台見智者淨土儀欣然會心嘗至招手岩因陳大願念阿彌陀佛四十八願誦已投身岩下若有神人捧之於樹乃復整心登岩曰餘生可厭大願已發惟海衆菩薩同相接引再投而下適在蒙茸草上久之復蘇寺衆舁歸身心無損後遊越之法華山一夕見白鶴孔行列西下蓮華開合光相現前乃起禮佛趺坐而化紹岩居錢塘湖心寺專誦法華期滿萬部得生淨土一朝有蓮華生於陸地岩誓焚身供養西方三聖吳越王俶力勸止之又往投身曹娥江中如有物扶其足漁者救之得不弱吳越王於寶塔寺建淨土院以居之一朝見蓮華光照其身越三日欣然坐化守真永興人講起信論法界觀常於中夜輪結無量壽佛往生祕密印至天將曉自覺身登淨土舉目見佛自俯伏像前念曰四十八願能度我者乃持香華入殿供養就座而化晤恩姑蘇人住慈光講法華諸經後於井中見白光出乃絶食念佛越三日見梵僧捧爐三繞之曰吾灌頂也以汝所修同我之志故從淨土來迎次日恩升座説止觀指歸即座面西而化衆聞空中絲竹之音依俙西去義通高麗人居四明寶雲敷揚教觀幾二十年常呼人為鄉人有問其故曰吾以淨土為故鄉諸人皆當往生皆吾鄉中人也後右脅念佛而化知禮號法智居南湖述妙宗鈔釋天台觀經疏大彰觀心觀佛之旨曾於每歲二月望日建念佛施戒會動逾萬人又撰融心解明一心三觀顯四淨土之義後於歲朝建光明懺至五日召大衆説法驟稱佛號數百聲奄然坐逝遵式初居天台東山遍行四種三昧後往四明寶雲結緇素專修淨業作誓生西方記及居天竺靈山於寺東建日觀菴為送想西方之法依無量壽經述往生淨土懺儀為杭守馬亮述淨土行願法門往生略傳後居草堂示疾弟子問所歸對以寂光淨土至夜奄然坐逝有基學於寶雲住太平興國寺一日示疾為弟子廣談圓旨衆忽見西方現光空中奏樂師曰阿彌陀佛與二大士親至於此即右脅西向而化門人夢阿彌陀佛授記為超壯如來或夢師坐青蓮華執如意對佛説法者法智歎曰臥病談玄臨終見佛是可敬也本如號神照住東山承天三十年講經之餘集百人修法華懺一年與郡守章郇公結白蓮社一日升座説法與衆訣別江上漁人見雲端有僧西去明年啓塔尊容如生有蓮華産於塔前法師延壽字沖玄總角誦法華經五行俱下六旬而畢吳越錢氏時為稅務專知用官錢買魚蝦放生事發當棄市吳越王使人視之曰色變則斬不變則舍之已而色不變遂貸命因投四明翠岩禪師出家衣不繒纊食無重味復往參韶國師發明心要嘗謂曰汝與元師有緣它日當大作佛事惜吾不及見耳初往天台智者岩九旬習定有烏巢於衣裓後於國清行法華懺夜見神人持戟而入師訶之曰何得擅入對曰久積淨業方到此中夜半繞像見普賢前蓮花在手遂上智者岩作二鬮一曰一生禪定二曰誦經萬善莊嚴淨土乃冥心精禱得誦經萬善鬮乃至七度於是一意專修淨業振錫金華天柱峯誦經三載禪觀中見觀音以甘露灌其口遂獲辨才初演法於雪竇建隆元年忠懿王請住靈隱二年遷永明今淨慈日課一百八事未嘗暫廢學者參問指心為宗以悟為則日暮往別峯行道念佛旁人聞螺貝天樂之聲忠懿王歡曰自古求西方者未有如此之專切也乃為立西方香嚴殿以成其志居永明十五年弟子一千七百人常與衆授菩薩戒夜施鬼神食晝放生命皆悉回向莊嚴淨土時人號為慈氏下生開寶八年二月二十六日晨起焚香告衆加趺而化賜號智覺禪師師道播海外高麗國王致書獻物敘弟子禮師以天台賢首慈恩三宗互有同異乃館其徒之知法者博閲義海更相質難師以心宗之衡以準平之又集大乘經論六十部兩土聖賢三百家之言證成唯心之旨為書百卷名曰宗鏡又述萬善同歸集指歸淨土最得其要師既亡起塔山中有僧來自臨川曰我病中入冥得放還見殿室有僧像閻羅王自來頂拜我問此像何人主吏曰杭州壽禪師也聞已於西方上品受生王敬其人故於此禮耳崇寧中追諡宗照禪師蓮社立為六祖云慧才號廣慈晚居雷峯塔課佛不輟忽夢入一處若宮室者人告之曰淨土中品是汝所生復見一殿勝麗殊絶人曰上品之生以待淨慈本禪師也才臨終果書偈面西趺坐而化思義號淨慧住靈山二十三年退居草堂一日別衆而逝衆念誦久之忽復省曰適隨觀音大士行見金色沙門長身垂臂謂我曰汝報緣未盡過七日當遣迎至期趺坐而化瘞龕之日有赤雲垂布向西而沒元淨號辨才住上竺謝去居南山龍井焚指供佛左三右二專修淨土觀臨終告其友道潛曰吾西方業成後七日去矣至期右脅吉祥而逝從雅學於天竺海月誦法華經五藏彌陀經十藏金剛經四藏每字三拜禮法華三過自餘誦經禮拜無虗日誓生安養主客楊傑述安樂國讚三十首以贈之後於四月八日面西趺坐而化空中奏樂室內聞香若愚居霅川仙潭學於辨才歸覺海建無量壽閣勸道俗四季開會念佛凡三十年將順世夢神人告曰汝同學則章得普賢行願三昧已生淨土彼正待汝師乃沐浴更衣命衆諷十六觀經端坐默聽畢忽云淨土現前吾當行矣遽書偈而化本是無家可得歸雲邊有路許誰知溪光遙落西山月正是仙潭夢斷時又於半月前書一頌云空裏千華羅網夢中七寶蓮池踏得西歸路穩更無一點狐疑智深號慈行學於海月歸嘉禾開長堂供二十年專志念佛常以淨業化人得往生顯驗者甚衆一日示疾客至問安談論如常時客方出門師即遷化人見紫雲向西而沒處謙繼神照住白蓮一夕會弟子設香華諷普賢觀經阿彌陀經端坐稱讚淨土功德復告衆曰吾得無生日用有年矣今以無生而生淨土如入禪定奄然而化法師省常字造微姓顏氏錢唐人七歲厭俗十七具戒宋淳化中住南昭慶慕廬山之風謀結蓮社以西湖天下之勝遊乃樂嘉遁無量壽佛往生之仰止乃刻其像華嚴淨行品成聖之宗要乃刺血而書之於是易蓮社為淨行之名士夫預會者皆稱淨行社弟子而王文正公旦為之社首一時公卿伯牧三十餘年預此社者至一百二十三人其化成也若此比邱同志復千大衆有以見西湖之擬於廬山者無慚德矣天禧四年正月十二日端坐念佛有頃厲聲唱云佛來也泊然而化衆見地色皆金移時方沒壽六十二弟子奉全身塔於鳥窠禪師之墳側蓮社立為七祖云死心悟新禪師繼席黃龍宗風大振而切意淨業著勸念佛文令人發哀起信真歇清了嗣丹霞淳公洞下一宗至師大顯而卓菴補陀專意西方有淨土集行世慈受懷深得法于長蘆信公專心念佛而謂修行捷徑無越淨建西方道場苦口勸衆石芝宗曉嗣月堂洵公洞徹教部以淨業化人嘗集大藏諸書有樂文類行世寂堂元嗣密庵傑篤行念佛三昧感金甲神自天而降夢紅蓮華從地而出由是十洲蓮宗大行宗坦潞州人申氏子年十六師道恭淨髮五十年名播講林晚於唐州青臺鎮專求淨土三業四儀曾無暫忘政和四年四月二十七日夢阿彌陀佛謂曰汝説法止六日當生淨土覺而白衆至五月四日集衆告曰因緣聚散固當有時淨土勝緣惟憑時刻願衆念佛助我往生言已坐脫滿空雷鳴白雲覆地三日方歇所持瑪琉數珠盤於指上衆取之竟不能下子元號萬事休茅姓母柴氏夢佛入門次早生之因名佛來父母早亡年十九投延祥寺志通出家習止觀一日定中聞鴉聲悟道頌曰二十餘年紙上尋尋來尋去轉沉吟忽然聽得慈鴉呌始信從前錯用心於是利他心切普勸念佛代為法界衆生禮佛懺悔祈生安養創白蓮懺堂述四土三觀選佛圖開示蓮宗眼目立普覺妙道四字以定名派高宗皇帝召見賜號慈照後於鐸城三月二十三日告衆曰吾化緣已畢時當行矣言訖合掌示寂茶毗舍利無數敕賜最勝之塔懷義溫州樂清人父業漁懷幼時坐船尾隨父得魚私投水中父怒受撻無悔遂辭親出家景德寺天聖中試經得度稟法于翠峯顯禪師凡五住道場惟化衆念佛有勸修淨土説示寂之夕其徒智才問壘塔已畢如何是畢竟事師竪拳示之推枕而逝智圓居西湖孤山廣解諸經刻心淨土造彌陀疏及西資鈔勸發往生臨終坐化以陶器合瘞後十五年積雨山頽啓視陶器形質儼然爪髮俱長僧藏汾州人一生不受道俗禮拜專修淨土將終天樂次第來迎皆不赴及西方佛至別衆而化有嚴受業天台靈鷲依神照傳教晚居樝菴專事淨業作懷安養故鄉詩四篇為時所傳居山十年夢池中大蓮華天樂四列乃作餞歸淨土詩後七日加趺而化塔上有光如月三夕乃隱中立號明智居南湖常以淨業誘人其徒介然創十六觀堂為東州之冠實師勉之也一夕謂侍者曰今聞異香吾意甚適即召觀堂行人俱集含笑言曰吾往生期至即面西坐逝擇瑛桐江人依經論辨專雜二修以示往生之易又述淨土修證儀二卷行於世今人稱阿彌陀佛真金色一偈即師所撰也一夕有疾面西憑几念佛而化思照受業錢塘淨住刺血書法華經一字一禮如是十過誦十六觀經五藏彌陀經十藏法華一千部禮華嚴梵網淨土七經等凡二百七十卷每夜四更即起念佛懈怠之人聞聲悚愧又於月二十三日率道俗繫念三聖常及千衆終師之世凡三十年一夕語其徒曰夜夢佛金身丈六豈非往生有兆乎乃日請七僧以助念佛至七日晚涌身合掌厲聲念佛趺坐結印而化宗利受業會稽天華修法華懺三載夢亡母謝曰荷汝懺功已生善道期滿見普賢從空而過復謁大智律師增受戒法忽夢律師吐白珠令吞之嘗神遊淨土見寶池蓮華行樹之相尋詣新城碧沼修念佛三昧者十年後入道味山築庵名一相越十五年謂弟子曰吾見白蓮華遍滿空中三日復曰佛來矣即書偈曰吾年九十頭雪白世上應無百年客一相道人歸去來金臺坐斷乾坤窄奄然而化齊玉號慧覺初於霅川寶藏建淨土會念佛者如蟻之衆後住上竺夜半頂彌陀像行道念佛一日謂首座曰床前多寶塔現非吾願也所欲見則阿彌陀佛也可為我集僧念佛首座鳴鍾繫念將百餘人頃之曰今已見佛即瞑目端坐而逝仲閔所著教義憲章集三衢人於受業祥符升師子座見銀誓西方而至師曰吾一生解第一義誓取金臺今乃若此即座而化瑩珂受業霅川瑤山遍參教席禪門以疾歸受業酒炙無所擇竊念戒業有闕恐從流轉令同住取戒珠師所編淨土往生傳對床讀之凡讀一傳為一首肯既而擇一室面西設禪椅不食念佛三日夢佛大士謂之曰汝尚有壽十年且當自勉珂白佛曰設有百年閻浮濁惡易失正念所願早升安養承事衆聖佛曰汝志若此後三日當來迎至期令衆誦彌陀經師曰佛大衆皆至矣遂寂然而化靈照住華亭超果每歲開淨土會七日道俗常二萬人夢中見三聖跪問之曰靈照一生期生安養可果願不觀音指之曰淨土不遠有願即生一日臥病謂侍者曰吾往生有期矣即面西趺坐而化可久居四明開化常誦法華因坐化三日復蘇語淨土事與十六觀經不異見蓮華臺皆標合生者姓名一紫金臺標云大宋成都廣教院熏法華當生此中次一金臺云明州久法華生此又一金臺云明州孫十二居士合生此中又銀臺標云明州徐道姑當生此中語訖復逝五年徐道姑亡異香滿室二十年孫居士化天樂盈空感一郡人皆來送葬宗本初參天衣懷禪師有契悟後住淨慈奉詔入住東京慧林召對延和殿密修淨土之業臨終安坐而逝雷峯才法師神遊淨土見一殿殊麗人曰以待淨慈本禪師又資福羲師至慧林禮足施金而去人詰之答曰吾定中見金蓮華人言以俟慧林本禪師又小蓮華無數稱是以待受度人或有萎者云是退墮之人也善本試華嚴經得度自淨慈詔住法雲賜號大通後歸杭州象塢專修淨業有僧定中見方丈彌陀佛示金色身一日告門人曰止有三日在至期趺坐面西而化元照住靈芝弘律學尤屬意淨業一日會弟子諷觀經及普賢行願品加趺而化西湖漁人皆聞空中樂聲道言會稽人靈芝之高弟專修淨業臨終數日前見二神人長丈餘報言何不繫念於是大集道俗念佛三晝夜將畢自升座説法為衆懺悔至晚即座而化法師宗賾號慈覺襄陽人禮長蘆寺秀禪師出家願力弘深洞悟禪理元祐中迎養老母于方丈東室勸以䇿勵念佛七年不間母臨終果無疾善逝師勤修化物遵廬阜之規建蓮華勝會其法日念阿彌陀佛或百聲千聲萬聲各于日下以十字記之一夕夢一少年烏巾白衣風貌清美告師欲入蓮華會乞書一名賾秉筆問名曰普慧又曰家兄普賢亦求附録遂隱師覺謂耆宿曰華嚴離世間品有普賢普慧二菩薩助揚佛法今同大衆結會念佛期生淨土感賴聖賢幽贊録中乃以二大士為首遠近向化撰坐禪針勸孝文一百二十則述勸修淨土頌有云三界炎炎如火聚道人未是安身處蓮池勝友待多時收拾身心好歸去目想心存望聖儀直須念念勿生疑它年淨土華開處記取娑婆念佛時臨寂念佛坐化靈芝照公稱為近代大乘導師而蓮社推立八祖云惟月居諸塈化城明律學修淨業一日有異僧來迎後二日微疾急呼同住道寧曰今見阿彌陀佛可高八尺駐立空中言訖而化思敏依靈芝曾受戒法專心淨業二十年一日偶疾請衆諷觀經者半月三日見化佛滿室臨終念佛聲出衆外酷暑留龕七日不變異香郁然行詵誦四分戒本三日通徹學律於大智住明慶二十年偶寢疾即設像命徒繫念數日忽起索三衣自唱彌陀經厲聲念佛加趺而化法持居化度寺修彌陀懺三年燼二指增受戒法造西方三聖像誦觀經彌陀經如意輪呪願促閻浮之壽蚤生安樂之一日小疾哭慟懇告願垂接引念佛之聲聞於百步忽見佛身丈六立於池上即自言曰我已得中品生端坐面西而化慧亨居武林延壽號清照依靈芝習律專修淨業殆六十年每接對賓朋必以念佛為勸建寶閣立三聖像最稱殊特貴官江自任每敬師忽夢寶座從空而下云是清照律師當升此座社友孫居士報師乍違即在家作印而化師往炷香回謂其徒曰孫君已往吾亦當行即請衆念佛復云彌陀口口稱白毫念念想持此不退心決定生安養即端坐脫去用欽居錢塘七寶院依大智學律聞其示衆曰生弘毗尼死歸安養出家為道能事斯畢即標心淨土一志不退日課佛至三萬嘗神遊淨土見佛大士種種異相謂侍者曰吾明日西行矣即集衆念佛黎明合掌西望加趺而化妙生會稽人習律學日踐淨土之業與大通本禪師居潮山象塢共明此道一夕會門人諷彌陀經就榻端坐取臨終香焚之合掌迎顧嗒然而化惟渥錢塘人杜門謝事閲大藏三過華嚴法華諸經計之總二萬卷晚年誦彌陀經二十藏一夕偶疾西向端坐作印而化仲明居山陰報恩素無戒檢偶因感疾謂同學道寧曰我今心識散亂何藥可治寧云但隨息念佛為上藥明即依法念之至七日力已困寧又令想目前佛像久之忽見二菩薩次又見佛迎接瞑目而化沖益居錢塘淨光刺血書淨土七經復金書法華刻西方三聖像依止觀坐禪法念阿彌陀佛一日感疾不服藥拈香對佛懺悔請大衆助念佛諷彌陀經至西方世界奄然而化法宗依雷峰廣慈學教用止觀行法修大悲懺至九載然五指供佛每月率四十八僧同修淨土懺久之夢佛菩薩來迎後三日合掌西望而逝睎湛山陰人少為儒生忽厭世出家與瑩行人於阮社同建無量壽佛殿專修淨業坐不背西久之常見三聖相一夕面西誦經正坐作印而化曇懿居錢塘淨住以醫為業晚年禮法華經修念佛三昧以平時所積供佛齋僧造像設浴如是二十年後微疾不服藥請利行人七僧念佛以助往生次日見蓮華其大如屋又一日梵僧到床問訊夜半衆聞念佛聲低泊然長往太微兒時投錢塘法安法師初授彌陀經便能背誦及受具願扄門念佛為不退僧常縱步後山忽聞划船笛豁然開悟因蓄一笛以自嬉有凌監簿者亦修淨業稱微為淨土鄉長一日叩門曰淨土鄉長弟相見微曰明朝可相見於淨土今日誦佛正冗耳翌朝人怪其不赴粥往視之見笛鉢禪椅先已焚却加趺地上而化思聰居錢塘法安日誦蓮經二部餘刻念佛未嘗談及世事忽謂弟子曰夜來見佛菩薩同來接引弟子曰恐是魔境不可便隨聰曰終時胸間有蓮華可驗越二夕命聲磬念佛喜曰佛來矣即奄然而化視胸前一掌許有文紅潤若開敷蓮華之狀了義號木訥鍾離少師之曾孫十五舉進士過金陵見保寧璣公聞法開悟即從剃落隨所至處扁曰昨夢念念西方未嘗間斷祥公赴黃蘗挽其偕行一夕祥夢師來別云西歸矣復見佛菩薩授以金臺越三日炷香宴坐含笑而化嘗詣五臺忽覺隨衆菩薩後行道有紫綬金章二人從其後師詰其名一僧引至殿旁觀玉牌金書王古葛繁二名字慧誠居錢塘資聖誦金剛經禮西方佛嘗神遊淨土親覩佛容潛於山積柴為龕入中念佛縱火自焚祖南居南嶽刺血書阿彌陀經五百卷金剛經一百卷法華經十部終二十七年皆用血書常時念佛期生安養末年血乾骨立念佛之聲不絶一日至方丈相對無別語即坐而化眉間迸出舍利隨取隨生法因住四明廣壽三十年冥心淨業偶在疾集衆諷觀經稱佛號者三夕謂門人曰吾將行矣或請留偈為之書曰我與彌陀本無二二與不二並皆離我今如此見彌陀感應道交難思議挺身端坐結印而逝了然號智涌住白蓮二十四年夢兩龍戲空中一化為神人袖出書曰師七日當行既寤集衆説法大書曰因念佛力得生樂國凡汝諸人可不自勉即沐浴更衣集衆誦阿彌陀經至西方世界倐然而化能仁行人皆聞天樂之音祥光上屬天表智仙號真教住白蓮講道十三年西向十念歷十二時未嘗廢一夕微疾請觀堂行人誦彌陀經卷未終而坐脫能仁行人皆聞衆樂和鳴黎明始知師亡思淨居錢塘北關姓喻常誦觀經念佛不輟善畫佛必先淨室觀想一日畫丈六彌陀佛先見佛光遂悟筆法之妙人因號喻彌陀建藍院名妙行飯雲水終其身三百萬人忽靜默端坐心想西方越七日臨終索香供佛加趺而化異香經旬如湛試法華得度遍歷教席住烏鎮塔院日誦蓮經二部佛號二萬聲一夕念佛端坐而化所著教義號假名集思梵居西山星者謂之曰六月望師其終乎師曰造物焉能制修道之人汝言六月亡我且八月往至期沐浴坐龕中集衆端坐而化文慧居嘉禾青龍詩律高古與北峯印公為友北峯亦好吟慧奪筆責之曰吾兄大法柱石何必為此北峯感之遂折節為學卒為聞人慧專志淨業至老益勵臨終聞空聲云中品中生慧明號晦菴學於慧光僧録晚依菁山常照寺與至叶修淨業日課法華楞嚴圓覺持彌陀聖號以萬數慶元己未春示疾謂弟子曰吾學大乘求生淨土今遂願矣乃纍足坐逝衆聞天樂西來徘徊頂上茶毗之餘五色舍利不可以𮗾智廉居上虞化度寺初遍參宗門晚節一意西方慶元改元秋八月書偈別衆曰我夢中見阿彌陀佛大衆圍繞而説法云諸上善人當須專修淨業來生我國説已即隱我既見相往生必矣即回身西向作印坐逝淨觀居嘉禾寂光庵修淨土懺法十餘年謂弟子曰我後月二十七日當去至兩日前見紅華次日黃華滿室皆有化生孩兒仙帶結束及期入龕坐命衆誦經念佛頃之即脫去利先居新城法慧日誦法華課呪念佛至中夜其聲哀切仰訴娑婆極苦願佛早垂接引得遂往生如是十年晚歲屢感祥夢忽示疾命衆念佛西向凝望端坐而逝師安受業烏鎮普靜通華嚴宗旨修彌陀懺觀想淨土二十年昕夕不廢一生多病臨終忽精爽謂弟子曰佛菩薩已降吾將行矣即端坐而化如寶受業霅川覺華因聞自昔珍禪師夢設浴往生事遂發心開長堂浴二十年及建立佛像願求往生年八十一請衆啜茶言別遽聞鍾鳴一聲衆皆驚異即向西加趺合掌凝望而化顯超博州人親授金總持三藏穢迹持呪之法濟病解冤計所得施利五萬緡入永壽常住後病中見佛菩薩前迎蓮華遍滿技樂雜奏弟子皆告留法師住世救苦淨土變相漸漸隱沒乃復住十五年行呪救人一日天樂異香佛及衆聖如前迎接即面西加趺而化有開居霅川千步寺專修淨業朝暮不忘於歲朝請衆念佛諷經至西方世界即瞑目長逝道生居常熟興福造丈六彌陀像得縣令梅汝能施財粧采即集衆諷經念佛陳白慟哭辭佛歸臥房書偈坐亡若觀居烏鎮嘉會結十萬人念佛人各十萬聲期先得生者次第汲引師請法華光明二經日滿百部二十年中誦滿六十萬部誓與羣生莊嚴淨業一日空相來訪相陪齋食忽索筆書偈趺坐而化覃異居餘姚龍泉誦法華五千部普賢行法彌陀經各萬卷靜室禮佛不舍晝夜忽微疾集衆告曰吾安養有期即面西纍足而逝元肇四明陸氏文章陸佃之族蚤歲習律閲大藏誦蓮經萬部又刺血書蓮經一部律宗諸疏三部建炎四年金虜破四明師時住湖心虜逼之北行至南徐謂左右曰吾將西歸矣即聞笙歌之聲一時軍民咸見師西望念佛而化智印居霅川祇園常想念淨土朝夜無間病中集衆諷彌陀經甫畢加趺合掌而化戒度習律受業棲心晚住餘姚極樂病中作遺書別士夫道舊命衆誦觀經至法身觀厲聲念佛加趺而化道琛號圓辨為南湖八世祖於彌陀懺宴坐中見法智尊者於法華懺中見普賢放光每月二十三日建淨業會以為常課道俗俱至一日示疾願平日一毫之善回向淨土集衆諷觀經不絶七日謂首座曰吾已見佛身聞異香乃沐浴更衣書偈曰唯心淨土本無迷悟一念不生即入初住復令諷安樂行至深入禪定見十方佛嗒然而化有朋號牧庵住南湖一日坐青玉軒請行人諷觀經至真法身觀復令大衆唱佛留偈坐亡妙雲四明楊氏號慈室自南湖退處溪口吳氏庵一朝沐浴趺坐謂侍人曰吾有瓣香藏之三十年矣擬臨終焚之用報佛恩今正其時及香光正熾起白佛陳意就座而化睎顏字聖徒四明人一生不肯住山晚年居桃源厲氏菴專心念佛十餘年嘗扁小軒曰憶佛作偈有云隨波追浪去翩翩彈指聲中七十年豈不向來知憶佛欲從老去更加鞭自憐憶佛暮年深除佛無能寫我心誰道萬金為客好終非一飯在家林臨終沐浴更衣端坐念佛而化了宣四明寶林肄業入南湖光嚴堂閲大藏預法華期懺二十七年與榮行人最相善一日詣榮室默坐榮問之師曰西歸有期難忘道義冀公淨土重會耳榮喜曰正所幸願忽示疾請衆諷彌陀經念佛之際端坐書偈曰性相忘情一三無寄息風不行摩訶息利合掌而化炎暑停龕七日顏色紅潤口角有微涎觀者以帊裛之異香噴人士庶聞之傾城來裛香涎愈滋闍維之處舍利無算善榮四明小溪周氏入南湖觀室十六年閲藏經修期懺金書法華楞嚴淨名圓覺光明諸經造彌陀像遇法會則拈施自畫水墨觀音求者便與宣公亡後三年忽取經像分施親故請衆諷普賢行法經彌陀經念佛聲中加趺而化時以為赴宣公淨土之約弟子海印高行似之祖輝居四明郡城佛閣逢人但云阿彌陀佛説也説不得人竟以説不得和上目之鄞尉王用享夫婦事之甚至一日到其家告別云我明日行矣及諸檀俱會即入龕端坐求甘瓜啖盡一枚念佛而化如鑑四明塔山兩閲大藏長誦蓮經專志念佛晝夜不懈晚年庵居忽示疾請鄰庵諸僧繫念面西加趺含笑而化祖新受業四明福源布衣糲食為行清苦去寺不遠有大姓方氏以庵延之乃於福源創淨土院造像栽蓮月三八集道俗繫念一日往別方丈曰二月十五日將西歸特來拜辭枯腸欲得索麵一碗主人如其欲食訖竟往淨土院像前禮云祖新將行奉別尊像即歸庵集衆念佛遽出衆問訊曰祖新已拜辭如來尊像已拜別福源方丈今別衆道友十五日畢定歸去願諸仁者勤心念佛蚤得相會即趺坐念佛遽云佛已至此合掌而化中峰和尚諱明本錢塘人得法于天目高峯慧辨無礙密修淨業有懷淨土詩百篇道德人仰之如山斗龍象交參朝廷屢遣使賜金帛敕號普應國師春秋六十二示寂之日光明燦發塔于天目山中善住字雲屋蘇州人性稟高潔不近聲利掩關六時念佛誦持大乘禮拜懺悔久病不易吳中修淨土者和尚為最緇白多取則焉終時異香滿室有安養傳谷響集行世天如惟則廬陵人得法中峯妙悟出人建師子林菩提正宗寺于蘇城有臥雪立雪二室日坐其中念佛參學之流接武師單提直指之外復著淨土或問勸人終時靈瑞不一年六十九塔水西之原普度丹陽人弱冠出家初參寶山慧禪師深器之居廬山東林寺善法堂篤修念佛三昧著蓮宗寶鑑十卷闡化京師法王寺灌頂國師進呈其書降旨褒美梓行天下有開導人天續佛慧命復振東林之語臨終別衆念佛而逝世稱優曇宗主妙文九歲出家三十始出世縱無礙辨若峽倒川奔後專修念佛三昧臨終預知時至命諸弟子高聲念阿彌陀佛面西趺坐而蛻盤谷狀貌不揚而志氣超邁性耽山水嘗云足迹半天下詩名滿世間時高麗瀋王聞師德望聘講華嚴七衆傾服瀋王大悅後至松郡構精舍勤修淨業日課念佛年七十無疾預告以時端坐示寂楚石梵琦蜀人篤信西方因抵燕京聞樓鼓聲大徹洪武初三詔説法京都皇情大悅後築室號西齋一意淨業有憶安養詩曰日夜思歸未得歸天涯客子夢魂飛覺來何處鴈聲過望斷故鄉書信稀幾度開窗看落月一生倚檻送斜暉黃金沼內如船藕想見華敷數十圍嘗見大蓮華充滿世界彌陀在中衆聖圍繞將示寂示衆曰吾行矣人問何生答曰西方又問西方有佛東方無佛耶乃厲聲一喝泊然而化祖香江西新喻人於山東龍潭寺精修淨業有居士王傑者築庵延之未幾語傑云某日當歸家衆苦留香云歸安養家耳及期敷座西向坐逝舉龕入山化火自焚慧日號東溟姓賈氏即宋相似道之諸孫似道謫戍時師尚幼志求出家至正間下天竺災元臣高納麟請師新之至洪武二年上召見奉天殿朱顏白眉備奏稱旨太祖顧謂衆僧曰爾等何不質諸經奧義於白眉法師嗣後召見但以白眉呼之後歸上天竺日修彌陀懺以臻淨業一夕夢青蓮生方池中寤告衆曰吾生淨土之祥見矣後四日合爪趺坐而化法師蓮池諱袾宏杭州沈氏弱冠棲心佛乘嘉靖丙寅依無門性天剃染尋受具戒單瓢隻履遍歷知識時辨融笑巖兩禪宗最著就參多所契合北遊五臺感文殊放光隆慶辛未見雲棲山水幽寂遂結茆終焉環山多虎災師為諷經施食虎患以寧歲旱循田念佛隨足所至時雨霑澍自此化道大盛師獨闢淨土一門融會三藏指歸惟心四方緇白頂禮問道者相踵名公巨卿如陸光祖張元忭馮夢禎陶望齡虞淳熙宋應昌輩靡不心折歸依師天性篤孝每懷木主出遊食則具供叢林濟孤必薦沈氏先宗慈悲幽冥自習𦦨口恆親設放屢有見師座上現如來相者觀力然也拯救物命撰戒殺放生文城內外及山中俱置放生池萬曆中慈聖太后遣中貴詢法賜紫衣黃金使者出金歸常住衣奉高閣未嘗挂體師肩荷正法修四安樂行以念佛三昧普攝三根著彌陀疏鈔雲棲法彚二十餘種行世臨終半月前入城別故舊弟子宋守一等曰吾將他往還山與衆話別亦如之衆以師欲謝客輒居長壽庵莫測其故至期面西念佛端坐而逝大衆哀請留囑閉目復開云老實念佛莫換題目時萬曆四十三年七月四日世壽八旬有一僧臘五十蓮宗之祖匡山逮宗賾而八海內論定協一以師為九祖云寶珠嘗遊杭郡嘉禾間冬夏一衲乞食自活宿無恆居平時惟念佛不絶口人喚之才應對即連聲念佛更無雜語一日告衆曰吾行矣索浴畢化去真青十九出家參無字話聞舟觸岸聲有省後遷華頂天柱峰修大小彌陀懺夢見西方三聖萬曆癸巳正月告終衆曰和尚往生何品曰中品中生也胡不上品生耶曰吾戒香所熏位止中品言畢而化佛石號法雨老人母夢僧以伽黎覆體而生幼時惡聞腥羶十四剃染十八受具戒於蓮池大師三十謁紫柏禪師於金陵親承授記師性孤卓不事世緣晚年謝客避居於武林峯頂搆一室開一壙曰吾生可棲死可葬既久示病弟子請留偈師走筆書曰一句彌陀五十年分明掘地討青天而今好箇真消息半夜鍾聲到客船投筆而逝湖廣黃州有無名僧專念阿彌陀佛晝夜不撤隨其所見皆稱阿彌陀佛崇禎癸未黃總戎鼎守郡城師大聲念佛衝其道執之適張獻忠攻黃州師亦留城上夜間念佛且頻呼醒睡軍士恨之縛投城下未幾復在城上念佛如是四次每東城下則西城上南城下則北城上中軍白于總戎始敬禮焉時黃州大飢人相食師出城外飢民持刀化師捨身師解衣示衆云俟我念佛千聲即食我念至三百聲衆急欲加刃忽有兵馬從空中來飢民驚散而師已在城中矣山中獵人得一大虎師募之放生獵人索三十金師止得四金獵人云汝能執虎耳三匝而不傷汝則與汝虎師遂授記虎執虎耳三匝縱之逸虎歸依師不去師與虎同住黃麻山金剛洞中內相盧九德督兵過黃州詣山訪之欲見虎師語虎止探頭于外盧欲見全身虎乃大呌躍出盧亦歸依焉師一日行街中見一雞高聲念佛雞亦隨聲而念庚寅師欲之武林道經白門寓秦淮河傍端午見遊船有巨公錢某曾歸依師呼云錢阿彌陀佛亦在舟中耶登岸見師師問同遊人知為某某放聲大哭曰衆生以苦為樂如是錢懇示修行之要師云一心念阿彌陀佛復云我行後汝有疑可問覺浪此明眼人也晉陵天寧釋海寶初值禪堂蔬腐每晨起輒留腐菜數擔列寺門遇行人募錢置其上完則令賣者收去始擕入供僧遇不樂施者務里許跟隨化之不輕易人破衲虱盈于上暇則席地念佛恆拈虱易上下總不離其身也踰年募蔬腐外更乞分釐積至數金便懇衆誦經禮懺已則念佛回向歷年如是崇禎間詞林鄭胙長約師朝南海已而却之發棹後每見師在陸前行追之不及逮登山入殿又見師在上炷香遣使伺同回復不得鄭抵郡即詣寺候師弟子云師沈臥已月餘茶水俱不啜昨方索飲起耳鄭因述其神異郡人由此欽信師一日廖君可來別師師囑曰某月日可相晤以了世緣廖如期至師煮茗酌云煩居士為老衲作一小影君可寫就不特形神逈肖即敝衣蟣虱亦覺歷歷浮動殆化工筆也越旬日趺坐念佛而化蕅益法師智旭號素華初參宗門後因大病發意西歸精修淨業著有彌陀要解佛頂玄文淨信堂集天樂鳴空等書臨化瑞應非一實相中年出家于佛日寺惟勤修苦行照管常住為事隨作務隨念佛所得即施不留餘資不與人諍亦無怒容壬申秋忽一日語人曰吾明日當西逝乃借雲棲一老人坐龕次日洗浴著新淨衣剃髮未竟已坐脫矣道樞仁和人每勸人以念佛為前矛平居勇猛念佛不染世緣順治乙未夢與神僧登玉屏峰頂丙申六月示疾二十六日朝語衆曰夜夢神僧來迓豈即昔之登玉屏峯者耶至戌時忽見幡蓋盈空蓮華布地即趺坐合掌念彌陀佛號百餘聲安詳而逝龕有異香具宗無錫人以念佛三昧誨人不倦順治己亥示疾約時沐浴但著一履密表隻履歸西之意誦彌陀經畢念阿彌陀佛十聲舉筆書大字云廓落靈虗無往來處擲筆而化新𠁼諱大真童身出家武林蓮居庵受紹覺師之法行般舟三昧終時諸弟子同夢見滿空天神執持香華唱云迎新𠁼大師生西方及旦弟子聚而候之師身康念佛相見如常過三日忽坐化林谷紹興人住羅山之西界破衲麻鞋惟勸人念佛為要務至終時見白雲立佛來迎而化土人改其庵曰白雲萬緣俗姓喬氏長興人為人淳和平日詈之弗嗔譽之弗喜專持彌陀佛號數十年康熙二年六月無疾忽自縛草龕九月初六日自入龕趺坐而逝本沖杭郡人居張家寺素專法席開導羣蒙康熙十一年九月示疾告終有頃復蘇謂大衆曰我平日缺念佛工夫今去無坐位汝等當助我念佛衆為合掌稱念逾時而逝爾立名廣志會稽人出家後結茅天台黃金洞專修淨業蘇州吳山殷天成詣天台飯僧服師道行延住吳山接引庵垂三十餘年隨機化導指歸淨土從受歸戒者異百人嘗結期念佛晝夜不絶聲其弟子造之見師經行之地大書阿彌陀佛放金色光訝之以問師師曰汝自本光發現耳乾隆二十六年四月望要弟子四人詣庵供佛臨別曰明日午前當來送我及期衆至焚香誦阿彌陀經稱佛名千聲端坐而逝實定號聞學上海人嘗主天目禪原寺晚至蘇州文星閣既徹法原應機利物慧辨無礙時為學人提唱念佛法門作念佛偈云念佛念自心念體元空寂當念了無依心心無別佛又曰西方開淨域不染世間情前路無知己君須獨自行又嘗作淨土詩一百八首暢演惟心之旨普勸人發回向心乾隆四十一年還江陰香山寺歲杪得疾明年正月三日囑付後事至黃昏起坐呼衆至命具湯洗手者再連稱阿彌陀佛説偈而逝誓願名佛安蘇州人年三十餘投上津橋天竺庵為僧已而住北濠大王廟以念佛為課得錢輒買香華供佛放諸魚鳥乾隆四十一年有疾逝前三日遣徒往獅林寺請僧禮淨土懺施食一壇期滿別衆稱佛名香三炷日午曰行矣端坐而逝旅亭和尚名際會嘉善人得法于聞學老人機鋒迅利嘗主席禪原已而至蘇州文星閣自言在天目西方庵修念佛三昧風聲水聲鳥聲蟲聲悉皆作唱佛聲及是掩關念佛作偈曰截斷世人生死路別開化外一乾坤不知那箇腳跟穩放下身心入此門乾隆四十六年下痢語戒弟子沈敬孚曰晝夜彌陀十萬聲一一從自己胸中流出方少有相應分那得工夫説間話管間事命侍者具湯沐浴其明日遂逝祥峯達文吳門人乾隆五十六年冬方閉關文星閣修念佛三昧夜夢三人入室南向坐其一僧服傍兩居士神儀儼然上有白光覆頂文禮問大德自何方來僧服曰西方文曰莫非佛國中人否曰然因問大德何名三人同聲曰汝名甚麼曰達文僧服曰却來妄語曰真也非妄僧服又問汝名甚麼曰達文僧服曰還要妄語曰弟子實非妄語僧服曰一切衆生以妄為真執假為實故受輪轉若有智者知是虗妄即無輪轉汝莫自迷失本真心當知真心無心真知無知覺知乃魔佛無知覺汝當信受莫懷疑惑文言下開悟曰的是佛法不可思議又問既自佛國中來曾見阿彌陀佛否左一人曰我向汝説汝終不信汝須親見始得三人齊起各向文頂上一拍説偈曰應當勤精進修諸清淨業因深則果實慎勿生疑惑又曰諸法從心生諸法從心滅心法本來空取捨不可得又曰生佛心法等譬如夢中境如幻三摩提汝已知少分偈畢即騰空向西而去空中樂音嘹亮文向晨而覺蓋此夢一令修淨業人解第一義無念而念無生而生不住中塗直趨寶所二令豁達狂禪知有淨土一門發無上菩提修如幻三昧可作蓮宗眼目高尼淨因大明志尚清修誓生淨土每入室禮念先著淨衣口含沈香文帝后甚重之將終之日衆忽聞沈香滿室俄而光明如雲隱隱向西沒焉法盛居金陵道場寺習十六觀想一夕禮像遇病假寐見大士乘雜華雲出寶色光前來相迎時諸尼欵門問疾咸見光明迸溢盛曰佛及菩薩放光度我言竟而絶道爰丹陽人先於諸事造大像七軀務極精麗又冶金銅造無量壽佛像忽於眉間放大光明地皆金色像與爰記曰汝舍此身必生我國即於像前端坐而化法藏居金陵勤志念佛夜間見佛菩薩來慰問光明照寺奄然遷化淨真居長安積善寺衲衣乞食誦金剛經十萬遍專志念佛語弟子曰五月內十度見佛兩度見淨土寶蓮花上童子遊戲吾已得上品生言訖加趺而化祥光滿寺悟性居廬山念佛願求往生忽聞空中音樂謂左右曰我已得中品生見同志念佛精進者皆有蓮華生寶池中以待其生言畢而逝能奉錢塘人專修淨業常夢佛光照身或聞諸尼善言開發一日無疾告其徒曰吾往生時至少頃聞奉誦佛聲厲奔往視之則合掌面西坐逝矣異香滿室樂音西邁慧安居四明下水大魁姚頴之屬也住小溪楊氏庵專業西方誦金剛般若寒暑不易節常於室中佛光下燭一日示疾端坐以手搖曳戒衆人勿喧移時曰佛至矣令衆念佛倐然脫去壽九十六無為蕭山來氏女幼誓不嫁蔬食念佛年二十剃髮結茆專修淨業三十遊方參學凡所歷處有病苦者隨物取與煎湯服之即愈嘉靖間宮中時疫風聞于朝召赴有驗賜無為心禪師之號送歸故廬將終日有神僧投宿無為却之再三神僧勸誡而進權宿禪牀睡醒不見知是神僧便起坐偈云六十四年活計今朝撒手歸西得箇菩提三昧依然明月清風即逝茶毗一團舍利塔于冠山本印號岐松吳縣人幼多病因發願出家年二十五父母送之城中圓通庵剃染尋受具戒別買屋數間以居名曰觀幻戒行潔清勤修福業歷諸名剎供佛飯僧回向淨土其年八月自九華歸結期禮大悲懺甫逾二七忽感微疾曰吾生緣其盡乎遂撤懺專持佛名至十月初旬臥牀七日右脅西向念佛無間已而囑付後事命其徒誦阿彌陀經至三周寂然而逝遂欽號越成無錫人九歲出家稍長遇一尼師激發專持佛名行住無間尋住蘇州南園白衣庵興復殿堂念佛益切年五十始受具戒至五十五乾隆五十三年三月雞初鳴召其徒曰吾將去矣徒曰師無他恙何出此言因泣下師曰癡人哭我何益認真念佛可爾遂趺坐西向同稱佛名盡炷香乃逝律宗號聖可嘉定人三歲失母其祖母擕至蘇城圓通庵尋剃染受具戒少好禮佛長習法華經苦不能解義因憤詣金山及杭州崇福參究纍冬歸而專修淨業屢詣諸名山供佛飯僧年五十三得咳疾遂閉關不出以西方為期至年六十四正月望集諸緇白同稱佛名至日昃顧視左右勸勉修行語劇苦切尋舉手稱西方極樂世界大慈大悲阿彌陀佛如是者三趺坐而逝蓮華香滿室中佛琦號見琳長洲人自少不願有家既長其母送閶門外雨華庵剃染尋受具戒已而受城中崇佛庵尼道堅囑付繼為庵主募金千餘兩造西方三聖旃檀像高八尺歲結七日期場集淨行僧為念佛會歷諸名山供佛飯僧為常州天寧寺置田州畝晚年專修淨業將逝前三日見菩薩現身兩童子侍或言聞菊華香師曰此青蓮華香也乾隆五十六年八月晦有近事女問疾師令扶起集衆焚香稱佛名可二千聲遂逝
