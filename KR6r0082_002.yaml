body:
  text: 釋秋波堂瑞璋輯居塵卓行烏長國王萬機之暇雅好佛法甞謂羣臣曰朕為人主雖享福樂不免生老病死無常之苦聞西方佛國誓願棲神於是日夜精勤念佛行道廣行布施利樂眾生每日設一百僧齋王與后妃親手行食時請名僧咨扣妙法三十餘年精專無替一日宮中見彌陀佛西方聖眾來迎祥瑞不一端坐示滅神色怡悅劉程之字仲思彭城人漢楚元王之後妙善老莊旁通百氏少孤事母以孝聞自負其才不預時俗初解褐為府參軍謝安劉裕嘉其賢相推薦皆力辭性好佛理乃之廬山傾心自托遠公曰官祿巍巍欲何不為答曰君臣相疑吾何為之劉裕以其不屈乃旌其號曰遺民及雷次宗周續之宗炳張詮畢頴之等同來廬山遠公謂曰諸君之來豈宜忘淨土之遊乎程之乃鑱石為誓文以志其事遂於西林㵎北別立禪房養志安貧精研玄理兼持禁戒宗張等咸歎仰之甞貽書關中與什肇揚搉經義著念佛三昧詩以見專念坐禪之意始涉半載即於定中見佛光照地皆作金色居十五年於正念佛中見阿彌陀佛玉毫光照垂手慰接程之曰安得如來為我摩頂覆我以衣俄而佛為摩頂引袈裟而披之它日念佛又見入七寶池蓮青白其水湛湛有人項有圓光胸出卍字指池水曰八功德水汝可飲之程之飲水甘美及寤猶覺異香發於毛孔乃自慰曰吾淨土之緣至矣復請僧轉法華經近數百徧後時廬阜諸僧畢集程之對像焚香再拜而祝曰我以釋迦遺教故知有阿彌陀佛此香先當供養釋迦牟尼佛次供阿彌陀佛復次供妙法蓮華經所以得生淨土由此經功德願令一切有情俱生淨土即與眾別面西合掌而化勅子雍積土為墳勿用棺槨時義熙六年也春秋五十九張野字萊民居潯陽柴桑與淵明有婚姻契野學兼華梵尤善屬文性孝友田宅悉推與弟一味之甘與九族共州舉秀才南中郎府功曹州治中徵拜散騎常侍俱不就入廬山依遠公與劉雷同尚淨業及遠公卒謝靈運為銘野為序首稱門人世服其義義熙十四年與家人別入室端坐而逝春秋六十九周續之字道祖鴈門人父後過江因居豫章八歲喪母哀戚過於成人十二詣范𡩋受業通五經五緯時號十經童子養志閒居窮研老易公卿交辟無所就入廬山事遠公預蓮社以為身不可遺餘累宜絕遂終身不娶布衣蔬食劉毅鎮姑熟命為撫軍復辟太學博士俱不就以嵆康高士傳得出處之正為之注釋宋武帝北伐太子居守迎舘安樂寺入講禮月餘復還山江州太守劉柳薦於武帝辟太尉椽不就武帝踐祚召至都間舘東郭外乘輿行幸問禮經慠不可長與我九齡射於矍圃三義辨析精異上甚說或問身為處士時踐王廷何也答曰心馳魏闕者以江湖為桎梏情致兩忘者市朝亦岩穴耳時號通隱先生續之素患風痺不復堪講乃移病鍾山景平元年卒春秋六十七張詮字秀碩野之族子也尚情高逸酷嗜墳典雖耕鋤猶帶經不釋朝廷徵為散騎常侍不起庾悅以其貧起為潯陽令笑曰古人以容膝為安若屈志就祿何足為榮乃入廬山依遠公研窮釋典深有悟入宋景平元年無疾西向念佛安臥而卒春秋六十五宗炳字少文南陽人其母聦辯富於學識教授諸子皆有成炳妙善琴書尤精玄理殷仲堪桓玄並以主簿辟皆不就劉裕領荊州復辟為主簿答曰棲邱飲谷三十年矣乃入廬山築室依遠公蓮社久之兄臧為南平守逼與俱還江陵閒居絕俗劉裕辟太尉椽不就二兄卒累甚眾頗營稼穡武帝勅南郡長時致餼賚衡陽王義季在荊州親至其室炳角巾布衣引見不拜王曰處先生以重祿可乎對曰祿如秋草時過即腐宋受禪徵為太子舍人元嘉初徵為通直郎太子建徵為中庶子並不應妻羅氏亦有高志羅氏歿炳哀之過甚既而悲情頓釋謂沙門慧堅曰死生之分未易可達三復至教方能遣哀雅好山水往必忘歸西陟荊巫南登衡岳因結宇山中懷尚平之志以疾還江陵歎曰老病俱至名山不可再登唯澄懷觀道臥以遊之凡所遊履悉圖之於室謂人曰撫琴動操欲令眾山皆響元嘉二十四年卒春秋六十九雷次宗字仲倫豫章南昌人博學明詩禮入廬山預蓮社立舘東林之東元嘉十五年召至京師立學舘鷄籠山置生徒百員除給事中不拜久之還南昌公卿祖道以送學子侄書曰吾童稚之年已懷遠略弱冠託廬山事釋和上遊道餐風二十餘載淵匠既傾復與汝曹歸耕先壟山居谷飲忽復十年及今未老尚可厲志成西歸之津梁自今以往家務大小一勿見關二十五年召拜散騎常侍不就復徵詣京師築室鍾山謂之招隱舘每自華林園入延賢堂為太子諸王講禮經是年無疾而卒春秋六十三子肅之頗傳素業官至豫章郡丞闕公則入廬山白蓮社既逝有同社人至洛陽白馬寺夜中為公則修忌祭忽一時林木殿宇皆作金色空中有聲曰我是闕公則祈生極樂國今已得生矣言訖無所見庾銑新野人梁武帝召為黃門侍郎不赴六時念佛一夕見道人自稱願公呼銑為上行先生授香而去四年願公復至遂化去空中言上行先生已生安養高浩象東平人杜門靜坐專誦無量壽經觀中汎紅蕖於玉沼初未見佛乃即華上傾心致敬遙睇佛之金容光輝遠映一夕見眾菩薩來迎奄忽而化宋蒲隋時恒州人念佛以小豆記數滿三十石設齋慶讚佛二大士化作三僧至會乞食滿曰弟子願生西方師來赴食深副本心事畢即見天花異香乘空而行未久滿遂面西坐化李白字太白作金泥畫西方淨土變相并序云我佛金天之西日沒之所去中華十萬億剎有極樂世界焉彼國之佛身長六十萬億由旬眉間白毫向右宛轉如五須彌山目光清白若四海水端坐說法湛然長存沼明金沙岸列珍樹羅網彌覆欄楯周張硨磲瑠璃為樓殿之飾玻瓈瑪瑙耀階砌之榮皆諸佛所證無虗言者若已發願未及發願若已當生未及當生精念七日必生其國功德罔極灼然難名讚曰向西日沒處遙瞻大悲顏目淨四海水身光紫金山勤念必往生是故稱極樂珠網珍寶樹天花散香閣圖畫了在眼願託彼道場以此功德海冥佑為舟梁八十億劫罪如風掃輕霜庶觀無量壽長覩玉毫光白居易號香山居士官太子太傅初勸一百四十八人結上生會行念慈氏名坐想慈氏容願當來世必生兜率晚歲風痺遂專志西方祈生安養𦘕西方變相一𨋀為之願曰極樂世界清淨土無諸惡道及眾苦願如我身病苦者同生無量壽佛所一夕念佛坐榻上倐然而逝韋文晉位觀察使建西方道場念佛發願一日正念佛中忽面西加趺而化異香滿室內外皆聞并州汾陽老人於法忍山借房止宿念佛忽大光徧照人見其登蓮臺而去鄭牧卿滎陽人舉家念佛唐開元中病篤有勸進魚肉者確乎不許手執香爐求願往生忽異香蔚充奄然長逝舅尚書蘇頲夢寶池蓮開牧卿坐其上張元祥長安人常念佛不輟一日催家人云西方聖人待我齋畢同往淨土及事訖果索香火加趺面西而化李知遙長安人率眾為五會念佛唐大歷中法照師於衡州開五會念佛今李知遙為五會應是師法於法照五會者當是五日為一會也忽出堂向空頂禮空中有聲云報汝李知遙功成果自招引君往淨土同汝上金橋即就床端坐而化天香郁然馬子雲唐時舉孝廉為涇縣尉押租綱赴京遇風船溺被繫乃專心念佛五年後遇赦因入南陵山寺持一食齋忽謂人曰吾一生坎軻遂精持內教今西方業成行當往生安養明日沐浴新衣端坐合掌異香滿戶喜曰佛來迎我言畢而沒于昶唐天后朝任并州錄事晝決曹務夜決冥司每知灾咎陰為之備都不形言凡六年丁母艱持金剛經更不復為冥吏至八十四將終忽聞奇香遽謂左右曰有聖人迎我往西方即念佛而沒元子才居潤州觀音寺誦彌陀經念佛忽小疾夜聞空中香氣樂音似有人言粗樂已過細樂續來君當行矣念佛而化異香數日不散元子平依京口觀音寺念佛誦經忽聞空中音樂即西向坐化異香數日不絕張抗仕石晉為翰林學士課大悲呪十萬遍願生西方一日寢疾唯念佛號忽謂家人曰西方淨土祇在堂屋西邊阿彌陀佛坐蓮華上見翁兒在蓮華池金沙地上禮拜嬉戱良久念佛而化翁兒抗之孫也鍾離瑾會稽人位至少師幼事母任夫人夫人精修淨業年九十八起居如常忽戒瑾曰人人有箇彌陀奈何拋去念念無非極樂不解歸來翌日予將行矣及晨起焚香誦佛過於常課合掌而化瑾日課利益二十事後宰吉水置一妾從其女嫁審之則舊令之女報所親緩納采擬先遣前令女所親復書曰公安得獨為高誼予有猶子請平分奩具俾同親迎公從之忽夢舊令來謝曰賤息荷收錄已告之上帝當十世有土然公更一紀應生淨土尋為浙西憲與慈雲懺主論往生指要清修彌篤自夫人有栴檀佛像常頂戴行道公繼其志像眉間忽迸出舍利數粒未幾知開封府忽夜半起謂家人曰夫人報我往生之期至矣即加趺而逝前一日舉家夢公乘青蓮華座仙樂異香海眾迎之西去計其年正一紀鍾離景融少師第七子官朝請大夫常誦觀經念佛不輟挂冠棄仕結茅儀真東園側甞曰識得彌陀彌陀彌陀不識彌陀奈何奈何不識彌陀彌陀更在西方外識得彌陀彌陀秪在自己家一夕命僧玅應誦普賢行願品炷香敬聽畢兩手作印而化自任氏少師大夫三世得生淨土曾孫松居於婺乾道中奉祠吳郡與寶積實師東平呂洎等結社念佛無所疾忽端坐西向合掌而化文潞公諱彥博守洛陽日甞致齋往龍山寺禮佛入殿忽見像壞墜地略不加敬有僧詰之公曰像既壞矣瞻仰何益僧云像無新故道不生滅公聞之有省作禮而出後參淨嚴法師誓集十萬人為淨土會普勸念佛臨終無疾念佛而化蘇軾號東坡官翰林學士南遷日畫彌陀像一軸行且佩帶人問之答曰此軾生西方公據也母夫人程氏歿以簪珥遺貲命工胡錫繪彌陀像以薦往生又老泉曾於極樂院造六菩薩像盖蘇氏之歸心三寶素矣東坡臨終述偈云生死猶如臂屈伸情鍾我輩一酸辛樂天不是蓬萊客憑仗西方作主人楊傑字次公無為人官尚書主客徧歷禪林參尋知識晚年𦘕西方佛像隨行觀念舍壽之日感佛來迎端坐而化馬亮官侍郎守杭詣靈山學淨土業慈雲為撰淨土行願法門淨土往生略傳臨終念佛而逝子玗朝奉又依十疑論用心在官閱教藏誦經念佛皆有常課忽一日易衣念佛端坐而化有氣如青盖出戶騰空西去几筵時現瑞光玗之子永逸官宣義每習十六觀歷三十年忽見三聖來迎結印而化頂熱有異香胡闉官宣義侍郎胡則之子晚年致仕笑傲西湖與清照律師相善一日有疾問律師曰一稱佛名能滅八十億劫生死重罪何也師曰佛大威德眾生一稱其名罪垢自消如赫日正中霜露何有闉大感悟一心念佛請僧為之助一日律師至闉曰荷二大士降臨甚久師為懺悔發願忽厲聲念佛安坐而化葛繁澄江人少登科第官至朝散凡官居私舍必飾淨室安設佛像每入室禮誦舍利從空而下普勸道俗同修淨業皆服其化有僧定中遊淨土見繁與王古侍郎同遊寶池行樹之間俄聞繁無疾而化王古儀真人官禮部侍郎與晦堂楊岐為禪侶甞作直指淨土決疑集楊傑為序又增補往生淨土傳皆行於世平時志在往生西方臨終無所苦忽滿室光明端坐而化有夢古乘蓮華西去者江公望釣臺人官司諫少年登科蔬食清修述菩提文念佛方便文以勸道俗有子蚤亡託夢舅氏曰欲稟大人乞就天寧寺看寶積經庶得生善處大人修行功業已成冥府有金字牌云嚴州江公望身居富貴志慕苦空躬事熏修心無愛染動靜不忘於佛法言談罔失於宗風名預脫於幽關身必歸於淨土宣和末知廣德軍一朝無疾面西端坐而化王衷居錢塘孤山即林和靖之故迹隱居自適政和間舉隱逸朝廷旋以處士後官至朝散大夫潛心淨業有大感悟日誦彌陀經七遍佛號萬聲十九年未甞間絕一日無疾沐浴面西加趺而化張廸居錢塘官助教從圓淨律師授菩薩戒咨問淨業法門然臂香以為誓每念佛揚聲勇猛至失音猶不已一日謂圓淨曰弟子近於靜室見白色頻伽飛舞於前又觀想中見嬰孩綠𩬊合掌問訊後三年念佛西望而化賈純仁霅川人官至郢倅潛心淨業長齋念佛因微疾西向宴坐而逝頂上白光圓相異香滿室梅汝能常熟人仕至縣令甞有志淨業忽夢僧授紙百幅鑿破為二八字以問東靈照師師曰二八十六也豈十六觀經之謂乎適一僧以經與之忽不見自是誦經念佛取名為往生以見志因邑中破山道生師造丈六彌陀像汝能施財百萬為之粧飾設齋慶懺殿前池中生雙頭白蓮一朵其花百葉當年冬汝能無疾而終未幾道生亦亡馮檝遂寧人號不動居士由太學登第初訪道禪林晚年專崇淨業作西方禮文彌陀懺儀歸鄉郡作淨土會感香爐中白光亘天舍利應現靖康兵厄名山藏經多檝積俸資造大藏經四十八藏小藏四大部者亦四十八藏造栴檀像彌陀九品化生隨身奉供後以給事中出師瀘南率道俗作繫念會及鎮長沙於廳事設高座著僧衣登座謝官吏橫柱杖於膝上而化吳子才字信叟蘇郡人與弟子章同參雲屋受念佛法門精進無間子才致仕之後預作一棺夜臥其中令童子擊棺而歌曰吳信叟歸去來三界無安不可住西方淨土有蓮胎及早回頭歸去來自從而和之一日令家人靜聽空中聞天樂之聲即曰清清界中失念來此金臺既至吾當行言訖而逝錢象祖天台居號止庵守金陵日問道於保寧全無用尤以淨土真修為念甞於鄉州建接對十處皆以淨土極樂等名之創止庵高僧寮為延僧談道之所自左相辭歸益進淨業嘉定四年二月微疾書偈曰菡萏香從佛國來琉璃地上絕纖埃我心清淨超於彼今日遙知一朵開後二日僧有問疾者公曰我不貪生不怖死不生天不為人唯求生淨土耳言訖加趺而逝時天皷震響異香芬郁未終之前子侄郡人同夢空中有云錢丞相當生西方蓮宮為慈濟菩薩王仲回無為人官司士參軍因楊傑為說淨土之法念佛益進未亡前七日預別故舊端坐而化時傑守丹陽夢仲回來謝云向蒙指示今得往生再拜而去已而訃至張榆官兩浙都總管期生淨土刻勵念佛闔門長幼靡不從化鑿池栽蓮日率妻子課佛萬遍孝宗皇帝親書蓮社二字賜焉陸沅道號省庵住明之橫溪晨起焚香趺坐目不他瞬首唱偈曰盥手清晨貝葉開不求諸福不禳灾世緣斷處從他斷劫火光中舞一迴然後念誦不緩不急聲如貫珠每日法華一遍彌陀萬聲一意西馳年八十五沐浴整衣而逝洎殮忽聞蓮華馥郁之氣皆不知來處近挹之盖出自口中王日休龍舒人為國學進士著六經訓傳數十萬言一朝捐之曰是皆業習非究竟法吾其為西方之歸即布衣蔬食惟佛是念日課千拜夜分乃寢甞為淨土文十卷簡易明白覽者無不信服一夕厲聲念佛久之忽曰佛來接我也屹然立化人夢一青童引之西去房翥暴亡入冥府王曰據善簿君曾勸一老人念佛彼已得生淨土君乘此福亦合得生翥曰尚欲誦金剛經萬卷即而放還後卒償其願臨終異相不違先報孫抃武林人號無諍居士幼學易因曰易所以窮理盡性何必區區為進取計掩關晦迹居絕俗務沙門守寧與之交謂曰白樂天以儒修身以釋治性君聞之乎抃深契僧語日閱華嚴金剛彌陀經甞夢至蓮池與清照亨律師同立其側又夢一人持書金字梵體讀之不解人曰請十三日齋耳十二月十三日忽得疾請妙光律師欲為祈禱抃曰生死已定何必禱之乃與開導往生淨土之旨即加趺作印西向坐化翌日清照至為入龕歸庵三日亦坐亡應同立蓮池之讖王闐四明慈溪人號無功叟凡禪林宗旨天台教門無不通達著淨土自信錄以明三身四土之旨晚年專心念佛西向加趺而化異香滿室焚龕獲舍利如菽者百八粒孫忠四明人蔬食持戒蚤慕西方於郡城東築庵鑿二池種白蓮臨池建閣月集道俗念佛期以三日後於病中請道俗百人繫念忽仰視虗空合掌問訊手結雙印怡然而化闔城皆聞天樂異香漸向西沒二子相繼念佛坐化甞因念佛見佛身現空中即白佛言惟願我佛少駐使我二子同獲瞻禮即走外尋二子歸佛為駐立良久後人因名其地曰駐佛巷昝定國號省齋為州學諭常念佛讀淨土諸經結西歸社以勸人嘉泰初於小江慧光建淨土院結石塔於池心為鄉民火焚藏骨之所印施念佛圖月二八集僧俗就淨土院諷觀經念佛以為常嘉定四年夢青童告曰佛令召君三日當生彼國至日沐浴更衣端坐念佛而化樓汾四明晝錦名門也因兄寶洲究明佛理每與沙門談道汾必從旁樂聽年二十二忽得疾乃一志西歸謂父母曰但得生淨土見佛此道最高仍令請僧說法開導諷觀經設像𭘼對臥床喜曰真我師也復請僧念佛千聲即曰吾已身在西方乃瞑目面西念佛而化魏世子宋時梁郡人奉佛精進唯婦不信女病死七日再甦即升高座誦無量壽經下啟父言兒去便往無量壽國兒及父兄池中已有芙蓉大花當生其中唯母獨無不勝此悲故歸啟報語竟復絕母自是亦信法教葛濟之句容人稚川之孫故世事神仙妻紀氏存誠佛法朝夜不替方織之次見雲日開明投梭仰望見西方如來真形幡盖映天心獨喜曰經說無量壽佛今得瞻見便頭面作禮及引濟之同瞻尚見半身俄而隱沒厥後夫婦念佛相繼而化左伸天台人從神照授菩薩戒刻三聖像誦法華三千四百部金剛二萬過後臥疾命男沙門淨圓唱法華首題增受菩薩戒夢三偉人立江皐召伸登舟復請僧誦彌陀經遽曰我已見佛光即端坐作印而逝范儼家武林絕心世務其子不能治家儼不之顧但云我自是寄客耳日誦法華念阿彌陀佛專心不懈忽見普賢菩薩乘六牙白象放金色光報儼云明日卯時當生淨土越一夕佛菩薩來迎家人聞其謙謝云儼是何人實為難當就座合掌而化閻榮池州人因僧勸修西方持決定往生呪每朝向西一誦千徧或率眾同持如是二十年紹熈元年春偶聞異香連日不消家人夜夢二青衣侍立榮之側其子又夢彌陀放光徧照堂宇悉作金色數日面西趺坐課佛忽起曰我去矣行數步舒手結印微笑立化姚約家霅川仙潭潛心內典有僧來謁必遜居東道謂不當以俗先僧也覺海友師勸里人結淨業社約實主其事忽告友曰久厭浮生不日西去師可助我繫念友遂日與持誦一日就座而化既而夢於友曰約已往生師之力也友曰欲從公遊可乎約曰師世壽未盡寺中景懿行當先至閱月果終懿同社友也沈銓錢塘人同妻施氏專心淨土平時諸善悉用回向後及妻前後命終皆感化佛持錫接引而去梅福松江人誦經持戒繫念淨土臨終預知即絕食飲水念勢至菩薩至七日澡浴更衣端坐告眾曰勢至菩薩今來迎我即座化去孫良家錢塘隱居閱大藏尤得華嚴之旨甞依大智律師受菩薩戒日課佛萬聲二十年不輟忽語家人令請僧念佛以助往生方半日望空合掌云世尊菩薩已荷降臨即退坐而化胡暠家霅川平時多作佛事忽夢佛呼曰汝可造屋迎我暠乃往明因建彌陀閣以協此夢臨終之夕忽云佛放光照我言訖而化唐世良會稽人持戒茹素念佛禮拜年老疾病猶不就枕誦彌陀經十萬過謂家人云佛來接我言訖作禮即便坐逝欲別利行人時在道味山夜夢西方異光旛華天樂空中聲云唐世良已歸淨土陸偉錢塘人為州都掾中年厭世念佛率眾結法華華嚴二社各百許人其法各人在家誦經一卷日終就寺讀誦終日而散如是二十年遂成大會甞手書法華華嚴楞嚴圓覺金剛金光明等經晚年子孫彫落更無餘累忽一日易衣端坐念佛而化李秉紹興中官也領御藥院初學禪於淨慈輝自得有省發晚閱龍舒淨土文日課佛號與其子閣長元美殿長林師文等數十人結淨業會於傳法寺久之感疾忽見彌陀佛以金圓光戴其首越七日又見金華滿房乃囑付親眷書偈端坐結印而終邵彪字希文鎮江人為士時夢至一官府人皆稱安撫彪自喜曰豈非予及第後作安撫乎行至前見一官員問曰汝知汝未及第因不對曰不知令引彪去看見一大鑊煑蛤蜊見彪乃作人聲呌彪姓名彪遂念阿彌陀佛方念一聲蛤蜊皆變作黃飛去彪後果及第至安撫使以此見殺生阻人前程不可不誡又見佛力廣大不可不敬官職自有定分不可苟求望江陳企甞妄殺人後見鬼現企畏懼急念阿彌陀佛鬼不敢近企念佛不已鬼遂不現後甞念佛臨終坐化後半年附本家孫女名妙光云我因念阿彌陀佛已生極樂世界舉動言語一如平生親戚相知皆來看至兩三日家人云惜乎你在生時不曾傳得喜神供養企遂現儼然如平生惟面帶小顏其頭如佛之螺髻劉慧仲湖州長興人以夜夢多恐懼龍舒居士勸以念阿彌陀佛慧仲至誠高聲念一百八遍當夜遂安寢次日如前念誦自此皆得安寢以此見佛力廣大無所不可李子清寄居秀州頗好道家甞從學於王龍舒久苦痁疾龍舒告云但恐子清不信若信之必效乃授以一方令臨發時專念阿彌陀佛而服此藥子清從之其日遂愈八分次日復如是遂全愈子清由是篤信佛理常以淨土文置於袖中李彥通家會稽為鍛師因開元繫念往預其會忽悟世無常歸心淨業一朝得疾遽云我遊行淨土見二門扄鐍甚固逡巡之際見利行人開門引入見蓮池樓閣佛菩薩眾遂請睎經道果二行人至臥榻前說法䇿道舉家念佛西向坐逝陸浚家錢塘少事公門久之棄去以淨土為業預西湖繫念會每對佛懺悔必至垂淚道友相見說淨業因緣纔十餘句便悲咽感歎惟恐此生之不度三昧之不成往生之未諧我佛之未見也臨終得病請圓淨律師說淨土法門諷觀經至上品淨謂之曰此時好去浚曰眾聖未齊且待少時即起就竹床面西端坐頃刻化去魏師贊雍州人為僧童年十四念佛不絕遇疾而亡忽再蘇白父母曰阿彌陀佛來此我當隨行鄰人見空中寶臺五色異光向西而沒何曇遠錢塘人常持菩薩戒專修淨土業夜中念佛忽謂師曰見佛身金色光明旛華滿空異香盈室俄忽化去越大善寺童行常隨師善輝念佛禮拜一夕夢婦人持數珠賣童曰欲得一串恨無錢買婦曰我當與汝汝可開口即以數珠投口中童以告師輝曰此是大勢至菩薩授汝念佛三昧也過數日童見二大士持華座與之曰七日當乘此來生淨土童逢人即說我七日當往生也至期忽自唱曰大菩薩來矣即座儼然而化倪道者仁和人棄家作道者建小庵專意念佛欲焚身代一切受苦眾生供養諸佛久之有朱藤三窠生臥榻前謂眾曰此藤若焦我當西去臨終半月集眾念佛至於萬人焚身前一夕其地忽有光明金色高半尺許以手掬之隨浮掌中又謂眾曰我焚身時必有紫雲青雲從東北過西南是我往生之相乃四面發炬端坐其中果有二色雲瑞馮珉上虞人少事遊獵有巨蛇為鄉民害珉持槊往從之見蛇在岩下與黃特相持珉推巨石壓之蛇竟死後每思之慮蛇為怨對乃求佛解釋投志西方修懺念佛如是十載一夕請同修社人相助諷彌陀經念佛號次誦普賢懺罪偈願往生偈即端坐合掌而終潭州黃打鐵每用工時常念佛不絕一日無病托鄰人書偈云日夜丁丁當當久鍊成鋼太平將近我往西方即座而化計公四明桃源鐵工也年將七十兩目喪明里中昝學諭以擘窠圖印施勸人念佛計公初受一圖念滿三十六萬聲念至四圖兩目瞭然如是三載念滿十七圖一日念佛忽氣絕半日復蘇曰我見佛菩薩令分六圖與昝學諭是勸導之首分一圖與李二公此是俵圖之人囑其子往謝學諭言訖沐浴西向坐逝徐六公嘉興農夫也翁婆蔬食設像繫念如是四十年屢夢遊淨土預作一龕臨行之日易布衣草屩入龕端坐頃之即曰佛來迎我泊然而化沈三郎家臨安商賈為業晚年回心念佛一日病請僧講彌陀經設尊像日夕西顧忽易衣而終須臾縮膝欲起坐二子以易龕為難曳脛令直經半日欲斂忽舉手出帛被矍然而坐舉家驚避二子急前扶衛恐其子曳脛以肘節捶之子曰助父坐脫耳茶毗有白鶴二十九隻飛翔雲表久之西去何曇迹年十八持菩薩戒念佛一宵四皷即起念誦人云太早答云見佛金相旛華來迎遂脫去朱綱京都人業儒中鄉舉三上春官不第乃就職官二府致仕專修淨土日課佛三萬十五年無少怠臨終坐榻上兩手擎珠念佛不撤異香滿室乃云佛來也連聲稱念而逝顧公寶幢名源志修淨業與道友張老居士善疾篤集僧俗十念阿彌陀佛唱和相續張與焉公謂云此時尚不見動靜張云汝大錯何用疑須專切打起精神念佛須臾間眾忽聞異香滿室公自見身坐蓮華中諸子悲戀不勝諭曰汝等謂我往何處何處即此處諸佛迎我三皷啟行我願既遂汝等之願亦慰矣至期含笑而去朱元正海鹽人為諸生時講孔孟之學端方不苟六十後深入禪悅于宅後敝屋三楹閉關不與家事門上題譬如我已死了六字每日功課午前諷法華經一卷午後念佛千聲庚申四月唐宜之同其門人陳則梁訪之公謂則梁曰宜之向曾與汝書勸子修淨業可切聽之既而則梁曰老師年高盍少開酒禁公曰子意謂衰年當藉數盃以調氣養血耶不知我之生死已畫得斷何復言此公說畫得斷時因以手在几上畫一畫盖已了生死矣七月無疾忽謂子曰吾在此無事可行矣子問何處去曰西方去子及孫固留許之至臘月朔示疾不食家人倉皇治後事公曰勿忙此臘八半夜事也預誡家人臨行時勿令婦女來過二三時來亦勿哭及期端坐而逝時方鷄鳴比天明眷屬方至舉哀公復醒開眼而不開口但搖首令女人去仍瞑目而逝丁明登號劒虹江浦人萬歷己酉歸依雲棲大師篤信淨土法門改號蓮侶丙辰登第宦遊溫陵每以出世大事開化緇素感悟甚多守衢時力禁屠牛有無賴犯法捕之急知公敬僧即薙髮進公令里甲察其還俗日重懲之其人勵志參修卒為名衲初任泉州司李憲批枷責公立法願納米者聽用以贍獄貧犯夏月修葺監舖給香薷飲葵扇冬月設暖匣椒薑擇醫視病更買素珠百十串散眾囚念佛恒語人曰人在患難發心者多吾乘其悔恨導之念佛幸而出獄為良民矣㦖念室中閨流不聞佛法請禪師演說大乘令于幃內聽之眷屬一時披剃者四人聞蓮池大師言有老嫗稱其夫念佛一心不亂臨行一請而別嫗由此深信淨土大師亦自此發心出家云公繪一請圖懸齋中題詩有與君一請瞥然去珍重相逢九品蓮句乙酉冬病劇十一月朔具疏告佛決意願求往生日焚一疏至第十日粥飲如常面色光潤諄諄以同生西方普勸親知就榻稍臥寂爾長往輯有故鄉消息蓮漏清音芥火菂商淡話十餘種行世唐時字宜之湖州人參蓮池師勤修淨業初以明經別駕壽陽繼輔襄國舉家眷屬悉歸依三寶晨則各持經文夕則同集念佛崇禎辛巳仲春闖賊破襄陽公投端禮門左井中家人掖之而出氣已絕復甦奉旨提究得從寬典旋請假歸里而襄陽季冬五日再陷矣初不死于宼繼不死于井終亦不死于法豈非慈悲默佑功德不可思議者耶公自述數年來感應道交丁亥臘八於長干寺念佛禮塔見佛相於塔光佛黃金色光則如雪如冰如明鏡戊子七月五日念佛于禪堂開忽見鍾山浮巨海中金佛巍巍祥光燦爍瓦礫墻垣喬木叢林盡空不見臨化瑞應彰彰所輯有蓮華世界書法音頻迦音等刻行于世劉通志京都人精懇念佛年五十二得疾念益切鄰人李白齋先卒通氣絕自早至午復甦謂家人曰適見一舟云往淨土乘舟三十六人白齋與焉我亦數內但衣未新潔又忘帶念珠特艤舟相待家人急為易衣珠掛其項須臾而逝唐廷任號體如蘭溪人孝友醇慤出自天性少遊黌校有聲已而覺世無常傾心至道參雲棲受念佛三昧遂力行之凡十三年如一日篤志西方萬曆癸卯仲冬六十壽朝忽謂諸子曰新春十一日吾歸矣數日前禮誦如平時至期盥漱整衣端坐手結印口稱佛名含笑而逝如入禪定楊嘉褘字華泰和人世家子也年十三持不殺戒蚤虱無所傷潛心淨土法門日誦彌陀經二十三肄業南雍俄疾作以萬曆乙巳仲冬十九日卒卒之先夢遊地獄見地藏大士於冥陽殿覺而放諸生命延僧誦經念佛謂人曰吾將逝矣青蓮花現吾前得非淨土境乎遂晝夜念佛不撤命息燭曰汝輩假燭為明吾不須燭常在光明中耳問何所見曰蓮開四色問見彌陀否曰見彌陀現千丈身問觀音曰身與彌陀等問勢至曰不見也言訖忽躍起拈香連聲語曰彌陀經功德不可說不可說吾已得上品矣寂然而逝仲兄嘉祚傳其事而矢之曰予所誑語墮拔舌獄其亦見之真而言之切歟不信淨土者可思已郝熈載錢塘人法名廣定平生忠信不欺以德行稱於黌校晚歸佛持誦夙夜加虔萬曆辛亥春二月得疾每睡覺云吾夢於山中求見佛佛未見見百鳥叢集如是累日至二十七子夜忽云有二童子來迎佛坐蓮華臺現吾前吾往矣吉祥而逝戈以安錢塘人法名廣泰性至孝素積善行而深自韜晦不求人知晚年精誠奉佛與靈芝僧玄素結春秋二社念佛誦華嚴五經忽謂人曰吾大限將至當為西歸資糧遂自室課誦昕夕不撤預定歸期於臘月二十一日前二夕母子環視悲哽居士笑曰生必有滅奚悲為吾方凝神淨域面覲彌陀若等慎勿以情愛亂我正念諄諄惟囑助念無間雜語至期寂然而逝孫叔子法名大玗自幼敏而好學年十二隨父鏡吾公奉四十八願彌陀像入雲棲因受五戒歸斷葷血矢志念佛誓取金臺勤苦不惜身命俄見兩比邱持蓮華以一心淨土印可復見化人誦金剛經一晝夜乃矍然起坐曰彌陀觀音皆來迎我結金剛拳印大呼阿彌陀佛數聲泊然而寂時萬曆辛亥仲冬十一日有淨土十二時歌傳世戴百戶與陶百戶共辦事巡撫麾下時錢塘江有殺人巨盜號滿江紅者黨勢熾盛官吏不敢捕巡撫潛召二人手給一牌令捕滿江紅二人𢬵身入賊多方誘致臨刑痛恨二人誓必索命二人懼棄職持齋誦經念佛以解冤結戴百戶忽預別親屬至期坐脫良久又醒曰陶兄臨去正念一差錯走路頭故我來與汝等說耳明日我當去次早復坐脫鼻垂玉柱異香滿室不散華居士江干人醇朴無偽與人不欵曲中年屬業諸子獨處一室不涉世事朝暮惟孜孜念佛而已後將卒自知時至更衣正冠端坐別眾而逝其子先已作棺于是易龕如沙門故事舉龕之日觀者如堵遠近嚮慕焉蓮華太公者越人一生拙朴惟晝夜念佛不絕命終之後棺上忽生蓮華一枝親里驚歎因號蓮華太公郭大林湯陰人平生端潔雅素出世為懷遇僧教以念佛遂一心淨土年七十六一日無疾與子別云明午當去至時坐脫糖擔老人住杭州賣糖為生口中念佛不絕忽一日挑糖擔出見人便曰汝早喫我糖我當歸去也更至數相識家約曰煩你明日來擡我棺我要歸去識者訝之且信且疑次早謂其妻曰可備飲食以待來人餉時識者皆至老人引令擡棺到家沐浴更衣拱手語眾曰我當自寢于棺不勞汝等將身坐棺中怡然就寢遂長往矣眾咸驚異吳江太湖灘有一老人生平惟喜念佛放生別無所知每行路時拾灘頭螄蜆放入水中雖極冗不顧平日遇有生命輒解衣割食買放曾無退懈忽一日謂家人曰吾當西逝可集親友送我因集眾念佛安然坐逝異香經宿不散蘇州一小民姓吳業澆燭故以著名僦居婁門一屋孑身長齋晝夜念佛以為人至誠吳閶內外數十大燭舖皆爭迎澆燭以燭係供養神佛三寶必念佛數聲乃澆油一杓一生如此年七十餘忽語店主云吾積有薄貲本為防老今以念佛功成至某日吾即去世生善處無用此矣敬以相贈主曰汝所積者乃眾店物非吾一家物也何敢受乎若必無用處請為汝作福吳君大喜乃以匙鑰授主令至所居地窖取出約有千金主為分給蘇州眾大剎齋僧及菴院接眾處皆分惠作福竟吳君如期合掌念佛端然坐逝吳門道俗送龕火化者千萬人焉太倉上舍吳叔寶名鳴珙家貲殷厚素好善預放生會然不甚通佛法六十餘自言欲脫化忽沐浴命延隆福寺印初法師宣授三皈五戒竟大呼出去者再合掌逝矣頃復開目語妻兄王煙客先生曰吾纔發永絕塵世願勇猛念阿彌陀佛從床下躍出竟是蓮華世界自省平日何善乃復此世人努力言訖索水自照中夜恍悟曰今生吳叔寶前生徐和尚復大呼快哉而逝有異香發于室太倉吳瞻樓晚年以家事付二子篤修淨土專注西方不雜餘業每日念佛幾萬外經則大小彌陀呪則往生觀則西方皆登簿冊寒暑無間如是者一十二年後七十餘定課不減西方聖境累現目前親見攢盒每格下襯錦繡上堆妙果其架大如田一畝床前不時白蓮湧出大如石臼童稚皆見乃怡然脫化太倉黃攝六名翼聖字子羽素為蓮社中勝友雖貴裔博學修潔篤好雲棲教一門精修以薦辟宰蜀之新都治民以慈惠政聲藹著相傳飯僧縣堂躬行七簋佈䞋施繼以膜拜聞者恠之後獻賊宼西川所過屠戮尸骸山積數千僧感公德誓登城擊板念佛中夜佛聲震天獻賊恠問故土人答曰以黃知縣平時好善飯僧僧為打板念佛以守城也賊誡勿擾寂然而過鷄犬不驚後歸田堅修淨業己亥陽月疾稍亟靈隱僧戒顯與其內兄王煙翁衝寒過其廬則四壁張彌陀像為西歸計矣乞戒顯丙夜授菩薩戒即為極談惟心淨觀攝公曰吾神明愈健誓願愈堅自信生西方必矣剋八日必行屆期吉祥而逝余集生得罪在獄首唱念佛諸人多從之處決屆期相聚晝夜不絕滿壁忽覩佛像光明旋奉恩詔末減金光前起身戒伍目不識字然見有義之事則必銳意為之其妻龔氏是盧州孝廉之女痛遭離亂歸心西方且粗知書史凡遇梵典晨夕持誦光前為之感動而篤信焉順治癸巳冬奉討不庭相携入閩道出武林聞具德和尚說法靈隱同往參問親承開示自此潛心念佛愈切愈堅辛丑夏還京駐節錢塘江干忽示疾龔為延醫光前止之曰我昔與汝親叩靈隱今正欲于此作轉身之活計求和尚一證明耳何以藥為龔大笑曰不意光前亦得到此田地遂徙帳入崇聖菴盖欲夫死得其所也菴居旬日龔造二棺謂人曰妾與金公偕行矣顧無人為公畢後事耳事畢我當往矣光前聞之即怡然長逝龔事畢屏絕飲食晝夜不臥一心念佛一日覺身稍倦倚棺而眠少頃醒曰時至矣端然趨寂顏色如生韓承山平湖縣人為人誠朴力務農桑積累家業田園約千餘金居恒惟持齋念佛而已年八十一康熈元年四月忽謂子曰明日汝可徧請親族來我欲與之話別子依教請至對眾曰我止有七日住世特與汝等作別至期沐浴更衣端坐悉令子女環坐念佛自亦念佛良久不動近視之已委蛻矣喬忠我長興人鬻竹器為生兩手削竹口中念佛不撒禮烏瞻普聞和尚每瞻山結制亦入禪堂康熈元年三日前預告親朋子女曰我將歸去至十月朔更衣向西正坐念佛有來視者令念佛相助對同道師僧曰而今一別當于蓮池中相會也言訖悠然而逝翟夢鯉法名淨震臨江人素行誠樸篤信淨土年踰古希精神矍鑠課念無違兼誦金剛經康熈戊申七月忽示疾至八月十三日緇素親友皆來探視乃謂眾曰感蒙垂顧須念佛助我往生手自輪珠毫無倦意頃云明早去矣屆期念佛而逝沈養素法名智恩臨江人耑修淨業寒暑靡間年登七十六涉險如夷時稱佛號誦金剛甞轉法華三十餘部康熈戊申八月偶抱小恙曰我當追蹤翟夢鯉也謂子曰九月十五日我歸去矣子云十五欠利十六好厲聲曰寧可上前莫使退後至十四日念佛而逝身有異香數日不散戴童子名公烈休邑人流寓塘棲鎮水北界生自儒門週齡失母為兒戲時不踰禮法年十二始習舉子業英英露頴十三益聦敏動止類成人然賦質清弱因醫㿀疹致傷胃氣乃就醫吳門寓所有蓮池大師竹隨筆數種每取其書反覆細閱若有會心七月初六忽端坐謂其祖曰助我念佛遂朗稱佛號其祖和之始則聲高漸至聲低終乃無聲尚見唇動頃之唇亦不動兀然而化沈敬孚名炳長洲人少得喘疾過三十而劇因發出世心持佛名頗切至年五十病益甚自正月至九月一息僅屬遂矢願斷肉其友楊廣文省之勸持金剛經扶起受之讀盡卷居三日加持至三卷半月而病愈自後日以三卷為常持佛名不撒夜坐輒至曉喘病遂除尋受五戒子旅亭和尚乾隆四十六年十一月示微疾數日其月晦晨起洗沐畢喘甚回首向西結跏念佛其妻在傍揮之去已而寂然即坐逝矣遺言以龕殮用茶毗法其妻尋出家為尼顧天瑞大人老而無子與妻陸氏長齋修淨業僧舍有為念佛會者夫婦與焉乾隆三十五年二月天瑞無疾誦佛名而逝年七十二陸士詮號近堂元和人初在玉壇為友祈疾有神教禮梁皇懺近堂因禮懺發心詣天寧菴受菩薩戒持名修觀誦法華經乾隆五十二年尋得瘍疾漏下臥牀不能起將終目光上矚若有所見口稱白蓮白鶴及諸大善人復連稱佛佛右脇而逝異香滿室中馬良名榮祖秀水人為諸生課徒以食年三十餘得咯血疾遇祥峯文師勸令念佛病良已遂長齋受五戒日課佛名三萬如是十餘年疾復作臥床月餘自言三聖現前說法日常在大光明中臨終見佛來迎連稱佛名右脇而逝時乾隆五十六年在閨清操隋文帝皇后獨孤氏雖處王宮深厭女質常念阿彌陀佛以八月甲子命終時永安宮北種種音樂自然震响尼大明與后最愛每念佛時先着淨衣口含沈香忽眾聞沈香氣滿室異常頃之有光明如雲來迎向西而去帝問闍提斯那三藏是何祥瑞對曰西方有佛號阿彌陀皇后業高超登彼國故現斯瑞耳姚婆因范行婆勸令念佛後臨終見佛菩薩來迎告佛言未與范行婆別請佛暫住空中范至姚婆立化荊王夫人王氏元祐中事西方甚精恪獨一妾懈慢夫人將逐之其妾悲悔極加精進一夕異香徧室無疾而終夫人忽夢妾起居敘謝因夫人訓責今獲往生夫人曰西方可往不妾曰但隨妾行夫人隨之見二池皆白蓮華或榮或悴妾曰此皆世間發心修西方人也人間纔發一心池中即生一花隨其勤惰榮悴各異中有一花朝服而坐其衣飃揚隨風疎散即見寶冠瓔珞莊嚴其身妾曰此楊傑也又有一花朝服坐上其花稍悴曰此馬玗也復前導數里遙望金臺光明交徹妾曰此夫人化生處上品上生也徐訪楊傑則已亡馬玗則無恙後夫人於生日秉爐焚香觀音閣佇立而化荊王楫徽宗之子吳氏縣君都官呂宏妻宏因異僧勸發妙悟佛理吳氏閱金剛經頌亦契空寂夫婦齋戒四十年吳氏忽見巨迹三雙皆金蓮花數日又見其膝又數日見其身數日見其面目即佛菩薩三聖人也及見殿閣境界清淨男子人問彼佛如是說法曰我得眼通未得天耳如是三年一夕徵恙自言吾將西歸言訖而逝甞事觀音列瓶數十以水滿中手持楊枝誦呪必見觀音放光灌諸器中病者飲之必愈世因號觀音縣君馬朝奉玗之妻王氏修十念法持破地獄真言甞夢地獄主者謝以持偈呪之賜後因寢疾念佛而亡親戚侍妾咸夢王氏言得生淨土蔡氏縣君居武林早年孀居持經念佛每朝禮像逾二十年忽見金蓮花現空中遽索平時修行課目卷而懷之安坐而逝馮氏少師珣之女承宣使陳思恭之妻少多病從慈受深禪師受教持齋誦佛逾十年益精進謂族黨曰清淨界中失念至此支那緣盡行即西歸一夕語侍者曰吾神遊淨土獲禮三聖夫聞其語即相陪念佛右脇安臥而逝三日之間玅香芬馥鄭氏錢塘人日課觀音經念佛不撤後病中索浴西向坐問家人曰聞磬聲乎淨土諸聖且至已而合掌喜曰佛菩薩來觀音手執金臺如來接我登座遂奄然而化陸氏宜人家錢塘朝請王璵妻常誦法華晚年尤篤淨土禮懺一會念佛萬聲凡三十載因微疾忽聞天皷自鳴人方驚異即面西端坐而化兩手結印續淨土傳陸師壽者即其侄也朱氏如一欽成朱后之侄歸於四明薛君繡法華經一部十年而成至化城喻針鋒綴舍利如栗連獲數十粒一字一拜禮法華者三於經首題別致八萬四千拜誦法華經三月而通刻擘窠圖勸人念佛滿十萬聲所化二十萬人獨朱氏朝夜誦之不可以數紹熈四年為寶幢藏繡經迎歸南湖飯千僧為慶讚是年微疾請僧念佛忽起加趺薛君曰吾家無是法於是右脇吉祥而化家人夢乘彩雲向西而去樓氏慧靖四明揚帥樓璹之孫適寺簿周元卿甞披味傳燈發明見地尤以淨業為真修晚年被疾忽見蓮臺紫色化佛無數異香滿室以語家人亟令念佛頃刻而化周氏玅聦周元卿之女每感母氏華臺往生之瑞甞誦經念佛願生安養病中請僧行懺自見其身著新淨衣在樓閣上作禮念佛謂家人曰汝輩當勤修淨業吾當於淨土待汝即右脇吉祥向西而化秦氏淨堅家松江厭惡女身與夫各處精持齋戒閱華嚴經法華光明般若無虗日晨昏修彌陀懺日禮佛千拜久之有光明入室中面西念佛安坐而化鄭氏淨安家錢塘念佛誦經日無虗度後得疾禱之於佛聞空中聲云汝行有期無得自怠又見佛身金色即奮身起面西端坐令男僧義修諷阿彌陀經倐然而化其女夢母報曰吾已得生淨土可說修師令知于佛子秦氏淨樂家錢塘其夫姓于賣魚為業有男販私商常遭官事秦氏愁苦幾欲沈身於江遇淨住寺照師勸之曰有此煩惱宿世怨家枉自沉江不如念佛秦氏醒然回心即燼一指誓長齋三自念佛十年不怠見一切人皆稱佛子一日請戒行人諷觀經每一觀誦佛千聲至像觀忽焉而化四明黃氏早喪夫歸父舍修淨業臨終稱佛結印履地徐行儼然立化家人篩灰於地以驗生虗見蓮花一朵生於灰中錢塘袁氏因往靈芝受菩薩戒即斷葷酒進修淨業一家皆服其化二十年不渝初志一日病中請圓淨律師說法忽見佛菩薩眾現前端坐而化錢塘陳氏媼從靈芝受菩薩戒專心念佛日課千拜常有舍利散經案上臨終見化佛來迎顧旁人語未及半已疑然不動矣武林王氏常誦法華念佛求度一朝見菩薩大身住立空中遂連聲稱菩薩高大菩薩高大又云恐女人足穢難升花臺語畢而化四明孫氏寡居齋戒禮誦念佛三十年不懈手製衣衾鞋襪施僧不記其數一日微恙見異人立床前曰宜勤精進又夢八僧遶行懺室身掛縵衣隨僧行道遂沐浴淨衣請僧行懺於大眾前端坐誦經至一心不亂左手結印奄然而化遠近皆聞空中奏樂上虞胡長婆李氏夫喪後日夜高聲誦彌陀經凡十餘年一朝有僧覆以緋蓋告之曰汝今月十五日夜子時去問師何人答曰我是汝念者婆遂會別諸親至時果有異香光明即端坐而逝七日火化齒如雪玉舌如紅蓮睛如蒲萄皆精堅不壞舍利不可以數次日焚處生一花如白鸎粟然安吉王氏女日誦彌陀觀音金剛諸經念佛求度母病亡既斂惡血流滴女發誓曰若我孝心真實願臭氣不生言訖流血即止以舌䑛漏處絕無穢氣父娶後室與同修淨業女得疾請僧說淨土觀法忽索衣吉祥而臥手攬觀音手中幡寂然不動繼母篩灰於室以驗受生見灰中印出蓮華數朵錢塘盛氏日課觀經誦佛不輟一日病中浴畢面西問家人云聞磬聲乎淨土眾聖且至已而合掌喜躍曰佛菩薩已至觀音手執金臺如來接我登座即奄然而化錢塘沈氏念佛十餘年日加精進命工𦘕八尺彌陀像病中安設床前欣然曰我何多幸即請僧念佛相助忽曰見一僧授我金臺遂於臺前方欲執錦褥角其臺即行恐有障緣望眾更為念佛眾皆勇猛厲聲良久復云念佛功德已登金臺此去不回矣即瞑目而逝蔣婆鎮江金壇縣株林村人年七十許死至陰府命未盡當還閻羅王問曰汝能念經否對曰不能王曰汝不能念經但念阿彌陀佛既放還蔣婆謂閻羅王教我念佛更無可疑故常念佛年近百二十歲無疾而逝任氏夫人修西方雕阿彌陀佛像長四寸八分龕飾甚嚴常頂戴行道其像眉間常迸出舍利大如黍米光彩照人事詳鍾離少師傳汾陽約山翁婆每日嗟歎世間無常無一可樂月晦必請僧二員永夜念佛翌朝設齋婆手自營辦臨終之夕咸見佛光入室寶葢覆於庭上婆忽遷化汾陽裴氏女專心念佛以小豆為數積滿十三石報盡之日索火燒香口云佛以花臺與我今當往生汾陽溫靜文妻病在床上夫勸令念佛二年不絕聲謂夫曰我已見淨土佛菩薩後月當去至期見金蓮花如日輪醴泉孟氏女久纏重病沙門勸令念佛三年謂夫曰可急報諸親令來相送暨畢集女焚香與眾念佛見空中執錫沙門曰汝當往生已而佛菩薩至旛華排空忽然遷化汾陽梁氏女兩目俱盲遇沙門勸令念佛越三年雙目開明後忽見佛菩薩幡盖來迎即日命終念佛道者陳氏賾禪師之母師住廣平普會迎侍方丈東室剪𩬊為出家相朝夕念佛四眾稱為道者後病中集緇素鳴磬念佛兩日忽合掌瞻像泊然而化明日頂溫面色鮮白師前一日夢母謂曰我見尼師十餘來相召師應之曰此往生之祥言已坐滅面色變白至是果然吳興陳氏受持齋戒誦法華五千部金剛彌陀諸經各一藏念佛滿三十年一日不食家人問欲何所須答云欲求見佛言訖右脇而化會稽胡氏淨安禮阿彌陀佛八萬四千相好者四會偶微疾見佛來迎安祥坐逝路人聞空中樂聲隱隱西去錢塘孫氏女常念佛持呪因病請清照律師至謂曰久病厭世願求往生師為談淨土因緣大喜至夜夢師持藥一盞服之流汗身心輕安三日後語侍人曰迦葉尊者來此好金蓮華座即瞑目結印而化仁和郭氏妙圓長齋念佛誦法華彌陀經及二懺常諦觀落日對想西方忽空中告云郭玅圓決生淨土清照亨律師即其兄甞往寺中建繫念會作百僧齋莊嚴淨土臨終之際請亨師說法求佛接引即時端坐凝然不動周行婆家太平州蚤年念佛專注一夕互跪念佛泊然而化鄰人見數僧自婆家出引婆騰空而去錢塘龔氏晝夜念佛誦彌陀經偶得疾請亨律師指示西歸講說未終端坐而化老妾于氏亦念佛不輟一夕夢龔氏告曰我已得生矣汝後七日亦當往生至期果逝嘉禾鍾婆日誦彌陀經十卷餘時念佛二十年為常課一日語其子曰見大白蓮華無數一婦人端正好衣立我前又眾僧在此何以供養子云不見遂無語端坐聳身而化潮山黃婆持金剛法華專心念佛暑中忽得痢疾但飲水不食鄰庵沙門善修常建念佛會婆病中欲請修修夢婆來謂曰將往西方修未以為異越二日婆西向念佛十聲端坐而化遠近皆見紅霞覆婆之屋霅川朱氏念佛三十年每讀金剛經以為聖賢在此不敢踞坐後忽不食四十日唯飲水念佛先夢三僧入室各執蓮華謂曰我先為汝種此蓮華汝卻歸來既覺喜悅乃請僧眾念佛為助即就座而化四明淨心女不知姓刺血自𦘕佛菩薩三聖像於羅木板凡一千片普散與人上有正信女淨心題云願所修淨業速獲成就不入母胎化生蓮沼後不知所終嘉禾周氏適庶民孫氏同翁婆常時念佛感室中佛像有光如螢或現鮮華或現佛菩薩像三時必聞天樂或空中誦經聲項氏玅智四明鄞人寡居二女悉令為尼同居楊氏庵見人唯勸念佛晚歲偶疾謂女尼曰多有尼僧相待西歸乃請人念佛忽曰我欲坐化錯與作棺也女曰佛用金棺無嫌也母喜諷上品觀轉身面西兩手作印微笑而逝沈氏妙智四明慈溪居自幼蔬食念佛長歸章氏未甞中廢施米貸被以濟饑寒常誦彌陀經為日課一夕微病念佛尤力忽見佛菩薩居士長者擁立目前燈光千點累累然狀如虹橋即日右脇吉祥凝然不動崔婆淄州人平生茹素性溫順不與同輩爭長短但誦阿彌陀佛不少撤不持素珠莫知其幾千萬遍年七十二得疾不下床然持念愈篤忽若無事時唱偈日西方一路好修行上無條嶺下無坑去時不用著鞋襪脚踏蓮華步步生咏不絕口人問誰語曰我所作曰婆何時行曰申時去果如期而逝依僧法茶毗舌獨不化常熟陶氏寡居常持普門品夢白衣人授以蓮華令食之又夢梵僧授以彌陀經覺即能誦不假師授一夕帳幌光明有彌陀像立經函上每誦經時必於卷上迸出舍利積以成合臨終時化佛來迎周婆鄞縣寶幢市人精修淨土遇歲首持不語戒晝夜常坐盡月而止遇夏月則施茶湯歷久不廢一夕夢大荷葉徧覆一市覺自身持數珠行道葉上既而微疾隣人見幢盖入其室黎明婆已念佛而逝鍾氏仁和張後溪之繼室年四十夫喪遂持長齋篤信念佛者四十餘載居常聞天樂鳴空又夜常聞戶外佛聲浩浩啟視杳無人跡如是異徵屢屢槩見泰昌元年臘月十六日臥病次年元朝謂家人曰見徧室蓮華并有幡盖懸于床前念佛而化薛氏武塘世族女也生時母夢長庚入懷後歸周生五子而寡秉節自誓供觀音香煙結蓮華人異之專心淨業好施不倦念佛十五年如一日萬曆丁亥五月得疾遂絕粒屏藥至九月六日延僧禮懺且曰四日足吾事畢矣乃西向對彌陀像晝夜繫念囑諸子翊贊著淨衣戴誌公帽長跪佛前念讚佛偈唱三歸依輪珠念佛一百八遍逮午趺坐而化蓮華香滿室于媼昌平州邵村于貴之母久積念佛一日浣衣甚潔謂其子曰予將生淨土子未信至期取凡置庭心坐几上脫去異香天樂比隣皆聞方氏諸生吳應道室三十寡守志歸佛專修淨土二十年萬曆乙酉年五十矣小疾念佛不輟無一語及他務卒前一日沐浴更衣然香禮佛還坐一榻而逝陶氏居士張守約繼室居士念佛陶亦信向每日課誦無間居士出禮普陀陶謂二子曰吾平日參是心作佛是心是佛二語今始悟初四日吾行矣及期端坐而逝次日居士歸成殮俄棺上出青蓮華五朵居士大駭異自愧不知其道行如此中官孫名之母一生齋戒念佛年老微恙自知時至告其子欲坐脫子哀泣止之不得乃為作龕至期入龕安坐化去陸母徐氏孀居刻志淨業夫有千金出貸焚券不取奩飾罄以施人恒于佛所禮誦不輟如是十載一夕忽呼侍人曰看東方光發否我待往生時至矣汝輩可助我高聲念佛合掌而逝劉道隆母李氏年四十長齋念佛修淨室一間供佛菩薩像朝夕稱禮每誕日誡子婦母設慶席惟禮懺一日或三日如此者二十五年將終前一歲延僧禮懺七晝夜夢大士持素珠一串示之曰以此授汝珠數乃往生期也夢中數之五十三顆不解其義至庚子五月十三日忽告家人曰吾今日行矣可舉家大聲念佛助我西行即面西念佛端坐而逝陳母朱氏吳郡人濬川居士室也孝慈天植素向三寶年八十一其子參雲棲歸導以念佛往生遂篤志淨業越二載示疾卒之前三日堂前大呼母名者三母云有二青衣在此時病久孱困忽躍起竪脊端坐諸子勸其寢息乃吉祥而逝迎尸中堂仰臥之尸自轉向西眾人歎其神異豫章人楊選一妻三十生子後即與夫別居聽其置妾自日長齋念佛至己丑十五年矣八月忽生發背痛楚入骨見一惡鬼以刀割其背肉有大力神驅之去苦若脫謂夫曰吾將行矣有童子四人相迎夫疑病中囈語問何往答曰往西方遂化江寧湯道人公甫母八十一歲自少長齋念佛每晨夕萬聲為課庚寅元朝公甫請融悟觀如兩戒師䖍修大彌陀懺以初四日五皷進壇有唐道人宜之者在壇外打報鍾平明見白鶴數十旅繞屋上壇內緇素悉見蓮華生佛座下內外金光覆空山河大地了無隔礙下壇方散此皆湯母䖍修淨土之現證也其往生上品必矣蔡坦如居士洞庭西山人妻甚賢良持齋念佛放生然燈作眾福不求人知既病劇謂坦如曰死固不須擇日但世人俗見謂修行人乃惡日死亦所不便幸為擇日明日吉乎答云不吉後日吉乎答云亦不吉乃曰吾不能更待矣今日吉乎答云今日頗吉因即命取水澡浴集親友念佛正坐合掌而逝寡婦張氏家在常熟小東門外奇窮苦守一心念佛却不揀淨穢即登廁亦念不轍後以痢疾而終遺下破裙一條即其平日所用曾無替換病時用以襯體汙穢不可近拋之河中即見蓮花朵朵五色燦爛散布水面見者稱異始知念佛果往西方也將裙送相近菴中作佛座卓圍至今在焉順治年間事餘姚徐氏適烏山胡振嶽舉四子一女年四十餘夫喪遂託委家事深居閫內至心禮念彌陀佛千聲如是者二十餘載一日無疾忽謂家人曰多有金童執寶盖迎接越三日當與偕行屆期呼家人囑訣曰人當念佛正坐而逝俞行敏妻卓氏平生性直心慈篤信佛法尊禮玉林具德兩大師間亦捨施遇貧病人必矜恤之依法修淨業日課念佛誦彌陀經經六載康熈丁未示微疾安然坐逝及殮時顏色如生歡容可挹杭郡太民江氏訒公嚴先生繼配都諫灝亭公沆之生母也太君產於望族賦質賢淑秉性仁慈年十五適訒公孝以承先慈以逮下凡五十餘年初訒公歸依蓮池大師篤信淨土太君方青年亦奉教䖍修每鷄鳴輒起長跪佛前誦經念佛千聲凡諸夜役不呼睡婢或勸無自苦曰以此累若輩豈學道人所宜康熈戊申三月六日晨課一如平時達朝仍寢疾忽大聲曰觀音菩薩來矣湯浴淨體就枕而逝沈易生妻傅氏法名德蓮素篤信向持齋念佛沈以瞽者賣卜所得悉以飯僧四方瓢衲聞風沓至傅氏不憚勞苦而䖍供者十有六載康熈壬子七月小疾至閏七月初一索浴更衣謂親屬曰此有金童來相接引扶行數步復坐合掌念佛瞑目而逝錢塘徐浩軒母太宜人奉佛甚謹繪念佛圖一紙上繪一大佛像旁累數千圈以記念佛之數已畢置黃布袋中數年矣康熈乙亥五月十四日念佛而逝申刻家人焚袋於磁盆忽盆內有聲眾疑盆碎俄見五色起布成緇色上現樓臺殿閣欄楯堦砌之形蓮華上合掌趺坐之佛數十雲中菩薩皆如白粉新𦘕者親友男婦童僕以及治櫬成衣之人無不驚嘆競觀次日將殮掇灰啟其袋背佛像樓臺諸形與袋面無異又一老媼執拂子隨行誠異事示驗也陸氏顧天瑞室長齋念佛乾隆三十三年得微疾沐浴就枕其妯俞氏亦修淨業隔屋居半夜聞陸氏呼之曰姆早晚好來吾先去趨視之逝矣年六十三明年四月俞氏亦無疾而逝年七十二陸氏金南溟族嬸日課佛名千聲齋期加五千聲如是二十年乾隆四十年十二月偶患腹痛翌日集家人長幼各致慰謝勸修淨業怡然而逝年八十七栢萬安母曹氏年六十四病熱萬安自蘇州馳歸視母氣已絕唯胸前微溫家人為治棺衾悉具萬安悲慟禱于白衣大士誦白衣呪一萬二千遍願減己壽一紀以益母涕淚并下其明日索飲閱數日病起萬安遂勸母修淨業除一室供佛像母遂長齋日以初中後分入室掐數珠誦西方佛名輒千計居十二年年七十六九月既望晨興謂其子曰吾將去矣可召諸親屬為別明日親屬畢至母悉與語戒諸子女臨去時勿哭日飲湯五六盞至第三日昧朝起坐洗沐畢易衣就枕而逝許氏常州人長齋奉佛年至六十五常慮未能專一其婿栢萬安請曰母年老盍去家吾有一室可奉母母從之遂之婿家萬安教以放下萬緣一心念佛母如其言自三月至六月未甞有間一日向萬安下拜萬安驚問所由毋曰吾生六十餘年顛倒夢想中未甞一日安樂自子導我以念佛吾朝而念焉俄然而夜矣夕而念焉俄然而朝矣世間安樂何以過之微子則不及此是以拜萬安曰甚善因為稱說極樂莊嚴且曰但得一心聖境自現聖境現時亦勿生著又三月母方夜坐忽見一金蓮華現前已而化作百千萬億蕚不層出上昇虗空光照無極向晨復拜萬安言其事母自是容色腴潤如三十許人終日無他言夜臥更許即起坐念佛雖精進衲子不及臨終瑞應不一吉祥而逝陶氏號瓊樓生平淨願甚堅病中持佛名益切臨終時見金蓮華現前惟曰大和尚來吾去矣其後五年隨寂根大士降于玉壇乩筆題詩曰雨歇閒階芳草多五年消息等流梭洞中深閉煙霞跡一任薰風送客過因語眾曰子等歸向極樂全須打得一副金鐵心膓外不為六塵所染內不為七情所錮汙泥中便有蓮華出現也一句佛號便有一光千句佛號便有千光光自內生非從外得以無相故阿彌陀佛在爾諸人面前隨處出現才有絲毫隔礙此光便不能發現矣念佛心要時時覺照方發得不退念頭念佛聲要心心悲切方發得無上願力心聲互融光明四徹無處不是佛無時不念佛方為得手佛號無量要知智慧無量神通無量慈悲無量攝受無量苟不發無量心安能親見本師頂相悲哉眾生欲念未除道根日壞佛之視爾將何以堪快快念佛去也汪氏號鏡智道人為李景熹繼室年二十六而寡發出世心受菩薩戒以佛法唱導鄉里從而起信者百餘人甞刺舌血寫法華經阿彌陀經梵網戒品各一順年三十八病痢一日起坐洗沐合掌念佛而逝費孺人彭際清室生平持戒念佛逝後玉壇弟子黃敬敷為叩孺人生處于普門大士大士示云一念能回向送心先到西功修久已積終不退菩提現生懈慢國將來可登九品袁中即云西方邊地名懈慢國信解未成戒寶未全者多生此地理固然矣發悔頓超惟恭荊州人常事酒博暫暇則誦經祈生安養同寺靈巋迹頗類之荊人嘲之曰靈巋作盡業惟恭繼其跡地獄千萬重莫厭排頭入恭聞之曰我佛閔我造惡拔我塗灰豈有地獄之入一日恭病巋出寺有所往逢少年七人手執樂器如寺之樂器狀曰我來自西方惟恭上人寺何在巋指之即於懷出金瓶取蓮華如拳漸開葉葉出異光望寺而馳巋大驚不敢回顧次日回寺則恭已夕亡巋因感悟卒守名節為高德云雄俊成都人善講說得財幣必非法而用又罷僧入軍尋因逃難復入僧中眾多畏避之俊聞經云一念佛滅八十億劫重罪喜曰賴有此耳自後當造罪口輒念佛然若存而亡猶伶倫之為戲一夕暴亡冥王曰誤追汝也然汝積惡多矣宜略經塗炭即令牛頭驅入地獄俊大呼曰一念阿彌陀佛能滅八十億劫重罪況我未臻五逆十惡又多念佛豈當至此獄卒不敢凌逼即以其語報王王召至謂曰汝念佛本無深信可且回世上更厲初心俊屢以語人時謂之地獄漏網俊乃入西山專意念佛後四年同輩訪之俊喜曰汝親見知當言雄俊以念佛力得生淨土母以為地獄漏網人也語頃即坐脫長安京姓本為屠因善導和上勸人念佛蒲城斷肉京嫉之持刀入寺興殺害意導指示西方現淨土相即回心發願上高樹念佛墮樹而終眾見化佛引天童子從其頂門而出天童即其識神長安張鍾馗殺鷄為業命終見緋衣人驅羣雞至唱言啄即四向上兩目血流痛不堪忍有沙門弘道見之為設像勸令念佛忽覺香氣滿室羣鷄散去即端坐化去長安張善和殺牛為業臨終見牛數十來云汝殺我善和告妻急請僧即為說觀經若有眾生作不善業應墮惡道善友告令至心具足十念稱南無阿彌陀佛除八十億劫生死之罪即得往生極樂世界善和大呌云便入地獄也即以左手擎火右手捻香轉身向西厲聲念佛未足十念即云佛來也已與我寶座言訖而終金家會稽業網魚因天華寺利行人結生蓮社蒙勸念佛頓棄前業日持佛萬聲久之告家人云我已見佛菩薩至門已見金蓮華來迎我矣即坐竹牀結印而化遠近皆聞異香吳瓊家仁和先為僧因家務還俗兩娶生二子屠酤庖膾無所不為遇造食殺鷄鴨以手提起唱云阿彌陀佛子好脫此身去每切肉時口常念佛及教村人念經修懺忽眼上生瘤如鷄子大常切憂怖乃造草菴獨居晝夜繫念依普賢行法發露懺悔一日無病往諸家言別來日去也次日請道友念佛相助將布衫換酒飲訖大呌云佛來也即便命終饒州軍典鄭隣誤追至陰府放還閻王告云汝還人間勉力為善汝見人殺生但念阿彌陀佛與觀世音菩薩彼得受生汝亦得福由此推之足以見念阿彌陀佛誠可薦拔亡者增延福壽不獨後生西方也錢青侯販醃猪一日忽謂其妻曰此罪也吾今徙業矣遂輟販請僧禮懺之日度羣猪日誦阿彌陀佛至年七十二雍正二年謂家人曰吾將去矣去時勿哭為我誦佛名贈行可也逝三日遂逝含識俱往裴氏鸚鵡唐成都尹韋臯記曰人有獻鸚鵡者河東裴氏謂此鳥名載梵經智殊常類常狎而敬之始告以六齋之禁及午後非時終夕不食或教以持佛名號仰首奮翼若善承聽每清晨永夜發和雅音阿彌陀佛聲聲相續一日有憔悴容訓養者鳴磬而告之曰將去此而西歸乎每一擊磬一稱佛十擊磬而十念成斂翼委足揜然而絕案釋典十念成往生西方又云得佛惠者沒有舍利遂命火焚之得舍利十餘粒貞元十九年九月日也長沙鸜鵒元祐間長沙郡人養一鸜鵒俗呼八八兒者偶見僧念阿彌陀佛即隨口稱念朝暮不絕因以與僧久之鳥亡僧具棺以葬之俄口中生蓮華一枝人為頌曰有一靈禽八八兒解隨僧口念阿彌死埋平地蓮華發我輩為人豈不知天台鸜鵒黃岩正等寺觀師畜一鸜鵒常隨人念佛後則常念阿彌陀佛不待教導一日立死籠中乃穴土以葬之舌端生紫色蓮華大智律師為頌之有立亡籠閉渾閒事化紫蓮華也大奇之句劉成魚唐天寶中當塗漁人劉成李暉載魚往丹陽泊舟浦中李它往劉遽見船上大魚振𩮻搖首稱阿彌陀佛劉驚奔於岸俄聞萬魚俱跳躍念佛聲動天地劉大恐盡投魚於江李至不信劉即用己財償之明日於荻中得錢萬五千十五貫也題云還汝魚直吳雪崖公為福州司理生平虔奉如來每往開元寺禮佛諷經素聞省僧多茹葷而本寺尤有蓄牲宰殺者公為請督撫嚴示立石以禁止之頑風未能盡革一日公在禪堂念佛一鷄聞之亦念佛公詰曰汝輩云寺中久不蓄牲矣如何有鷄索得之公念佛鷄仍念佛乃痛責僧曰今觀畜生尚有佛性汝輩薙髮破戒不若畜生多矣墮落何疑僧皆涕泣懺謝曰某等從此發大誓願誠實齋戒矣通省聞風知儆沙門為之一變公養此雞于署中恒念佛不輟後轉官擕至丹陽送入海會菴為其使遠近生信也雞至菴日即念佛立化公為樹塔誌焉江西鄒子尹祖為廣東兵憲有參將自知三世因一世為蛇二世為書生三世即今職因提兵征洞蠻過一山諭軍士曰我夙世曾於此山為蛇今欲進山視舊屬汝輩勿驚怖也入見洞中蛇無數參將作蛇語謂之曰我昔與爾并生于此只因我能念佛一聲即得生人中今為大將爾等何不念佛求脫此苦耶蛇俯首作受教狀凱旋日復入洞察之則萬蛇皆死應以念佛化去矣雛公聞而異之述其事以傳杭郡普慈寺僧天一畜一犬每遇蓮社眾信齊集誦經念佛犬即蹲伏而靜聽者有年矣康熈五年六月六日俗例猫犬同浴徇例浴此犬于池次早死于圊側僧眾憐之為說三歸依誦呪欲焚犬忽起立聽法音竟復合前爪而伏如合掌然一眾驚歎犬既現此神異則知平日蹲伏時必竭誠信向口雖不能言而心自默念其往生安養作上善人無疑矣天一頌曰荒荒古苑半靡蕪幸有靈牻義未辜踏徧苔蘚迎善客吠殘蘿月警頑夫遺骸日把真心顯公案誰參佛性無多載盡誠緣忽謝茶毗莫異海山狐
